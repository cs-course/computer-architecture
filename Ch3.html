<h1 id="%E6%B5%81%E6%B0%B4%E7%BA%BF%E5%A4%84%E7%90%86%E5%99%A8">流水线处理器</h1>
<p><strong>计算机系统结构</strong><br />
</p>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-class="lead" data-theme="gaia" lang="C" class="lead" data-marpit-pagination="1" style="" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="2" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9">
<h2 id="%E6%9C%AC%E7%AB%A0%E5%86%85%E5%AE%B9">本章内容</h2>
<ul>
<li><strong>理解通过微架构实现指令集</strong></li>
<li><strong>掌握指令流水线原理及性能分析</strong></li>
<li><strong>掌握和分析指令流水线冲突</strong></li>
<li><strong>掌握数据冲突原因及解决思路</strong></li>
<li><strong>掌握分支冲突原因及解决思路</strong></li>
<li><strong>掌握流水线具体实现方法</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="3" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9">
<h2 id="%E6%8C%87%E4%BB%A4%E9%9B%86%E4%B8%8E%E5%BE%AE%E6%9E%B6%E6%9E%84">指令集与微架构</h2>
<ul>
<li><strong>指令集ISA是软硬件的分界线，指令集的硬件实现称为微架构</strong>
<ul>
<li>解析指令格式，并执行相应功能</li>
<li>具体过程对于程序员和软件来说是透明的</li>
</ul>
</li>
<li><strong>微架构</strong>：指令执行流水线、超标量处理、缓存机制、内存存取调度策略、猜测执行、时钟门、预取机制、电压/频率调节、纠错等功能</li>
<li><strong>保证软件的兼容性</strong>：指令集保持不变，但微架构会不断优化
<ul>
<li>早期处理器设计者主要考虑电路的正确性</li>
<li>当前处理器设计者主要考虑执行性能、扩展功能、控制能耗和效率提升</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="4" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E9%80%BB%E8%BE%91%E7%94%B5%E8%B7%AF%E7%BB%84%E6%88%90">逻辑电路组成</h2>
<ul>
<li><strong>微结构硬件由逻辑电路部件构成</strong>
<ul>
<li>一个逻辑电路实现输入线和输出线的功能映射</li>
<li>通过真值表描述输入和输出之间的逻辑关系</li>
<li>进一步分解为基本门电路的组合</li>
</ul>
</li>
<li><strong>传播延迟（propagation delay）</strong>：输入信号的改变导致输出信号的改变，改变过程需要时间</li>
<li><strong>组合电路</strong>：输出严格依赖于输入的组合
<ul>
<li>基本门电路（与、或、非、异或等）、多路选择器、解码器、可编程逻辑阵列</li>
</ul>
</li>
<li><strong>时序电路</strong>：输出依赖于前期的数据输出和当前的数据输入
<ul>
<li>锁存器（Latch）和D触发器（Flip-Flop）</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch3p004.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="5" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E6%95%B0%E6%8D%AE%E5%AD%98%E5%82%A8%E9%83%A8%E4%BB%B6">数据存储部件</h2>
<ul>
<li><strong>组合逻辑和时序路径电路可以构造出更复杂的逻辑电路部件</strong></li>
<li><strong>数据存储部件</strong>：
<ul>
<li>(A) 32位指令计数器</li>
<li>(B) 32位寻址的指令存储器结构</li>
<li>(C) 32个32位寄存器组，能实现两端读和单端写</li>
<li>(D) 32位寻址的数据存储器结构</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch3p005.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="6" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="cpu%E6%95%B0%E6%8D%AE%E8%B7%AF%E5%BE%84%E4%B8%8E%E6%8E%A7%E5%88%B6%E8%B7%AF%E5%BE%84">CPU数据路径与控制路径</h2>
<ul>
<li><strong>CPU运行就是自动执行有限状态机</strong></li>
<li><strong>在当前CPU状态下，读取、执行一条指令及处理相应数据之后，产生新的CPU状态</strong></li>
<li><strong>从微架构角度看，处理器硬件对于一条指令的执行进一步分为</strong>：
<ul>
<li><strong>数据路径</strong>：包含数据存储和计算部件（指令计数器、指令寄存器、寄存器组、ALU和主存等）</li>
<li><strong>控制路径</strong>：控制指令在数据路径中的执行过程，告诉数据路径如何执行指令</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch3p006.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="7" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch3p007.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="7" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="content">
<h2 id="risc%E5%A4%84%E7%90%86%E5%99%A8%E6%89%A7%E8%A1%8Cadd%E6%8C%87%E4%BB%A4%E7%9A%84%E6%95%B0%E6%8D%AE%E8%B7%AF%E5%BE%84">RISC处理器执行add指令的数据路径</h2>
<ul>
<li><strong>在RISC处理器上执行 <code>add rd, rs1, rs2</code> 的数据路径和时序</strong></li>
</ul>
<table>
<thead>
<tr>
<th>阶段</th>
<th>操作</th>
<th>说明</th>
</tr>
</thead>
<tbody>
<tr>
<td>第一阶段</td>
<td><code>MA:=PC</code></td>
<td>RegSel=PC; RegW=0; RegEn=1; MALd=1</td>
</tr>
<tr>
<td>第二阶段</td>
<td><code>B:=Reg[rs2]</code>, <code>A:=Reg[rs1]</code></td>
<td>RegSel=rs2/rs1; RegW=0; RegEn=1; ALd=1, BLd=1</td>
</tr>
<tr>
<td>第三阶段</td>
<td><code>Reg[rd]:=A+B</code></td>
<td>ALUop=Add; ALUEn=1; RegSel=rd; RegW=1</td>
</tr>
<tr>
<td>最后</td>
<td><code>Reg[rd]=Reg[rs1]+Reg[rs2]</code></td>
<td>PC=PC+4</td>
</tr>
</tbody>
</table>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="7" style="" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="8" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch3p008.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="8" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="content">
<h2 id="%E7%AE%80%E5%8D%95risc-v%E5%A4%84%E7%90%86%E5%99%A8%E7%9A%84%E5%AE%8C%E6%95%B4%E6%95%B0%E6%8D%AE%E8%B7%AF%E5%BE%84">简单RISC-V处理器的完整数据路径</h2>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="8" style="" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="9" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E5%8D%95%E5%91%A8%E6%9C%9F%E5%A4%84%E7%90%86%E5%99%A8%E7%9A%84%E6%97%B6%E9%92%9F%E5%91%A8%E6%9C%9F">单周期处理器的时钟周期</h2>
<ul>
<li><strong>单周期处理器中，时钟周期由最长的指令执行时间决定</strong></li>
<li><strong>需要分析关键路径（最长组合逻辑电路通道）的总延迟，并做针对性优化</strong></li>
<li><strong>也可把一个长时钟周期分解为多个短时钟周期（微指令思想）</strong></li>
</ul>
</div>
<div>
<h2 id="%E4%B8%8D%E5%90%8C%E7%B1%BB%E5%9E%8B%E6%8C%87%E4%BB%A4%E7%9A%84%E5%85%B3%E9%94%AE%E8%B7%AF%E5%BE%84%E5%92%8C%E5%BB%B6%E8%BF%9F">不同类型指令的关键路径和延迟</h2>

</tr>
</tbody>
</table>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="10" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E5%BE%AE%E7%A0%81%E7%9A%84%E5%8D%95%E6%80%BB%E7%BA%BF%E6%95%B0%E6%8D%AE%E8%B7%AF%E5%BE%84%E5%AE%9E%E7%8E%B0">微码的单总线数据路径实现</h2>
<p><strong>微指令写使用寄存器传输</strong>：</p>
<ul>
<li><code>MA:=PC</code> → RegSel=PC; RegW=0; RegEn=1; MALd=1</li>
<li><code>B:=Reg[rs2]</code> → RegSel=rs2; RegW=0; RegEn=1; BLd=1</li>
<li><code>Reg[rd]:=A+B</code> → ALUop=Add; ALUEn=1; RegSel=rd; RegW=1</li>
</ul>
<p><strong>微码程序</strong>：</p>
<ul>
<li>Instruction Fetch: MA,A:=PC; PC:=A+4; wait for memory; IR:=Mem</li>
<li>ALU: A:=Reg[rs1]; B:=Reg[rs2]; Reg[rd]:=ALUOp(A,B); goto instruction fetch</li>
<li>ALUI: A:=Reg[rs1]; B:=ImmI; Reg[rd]:=ALUOp(A,B); goto instruction fetch</li>
</ul>
</div>
<div>
<p><img src="images/Ch3p010.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="11" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E5%8D%95%E5%91%A8%E6%9C%9F%E5%AE%9E%E7%8E%B0%E7%9A%84%E4%B8%8D%E8%B6%B3">单周期实现的不足</h2>
<ul>
<li><strong>单周期处理器虽然可以实现指令集，但从硬件角度来看，整体利用率不高</strong></li>
<li><strong>不同指令执行周期长短不一，一个部件使用时，其他部件可能完全空闲</strong></li>
<li><strong>为了提升硬件利用率和整体性能，需要引入流水线结构</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p011.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="12" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch3p012.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="12" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="content">
<h2 id="%E6%B5%81%E6%B0%B4%E7%BA%BF%E5%A4%84%E7%90%86%E5%99%A8-vs-%E9%9D%9E%E6%B5%81%E6%B0%B4%E5%A4%84%E7%90%86%E5%99%A8">流水线处理器 vs 非流水处理器</h2>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="12" style="" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="13" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E6%B5%81%E6%B0%B4%E7%BA%BF%E5%8E%9F%E7%90%86">流水线原理</h2>
<ul>
<li><strong>流水线中的每个步骤执行指令的一个处理环节，不同步骤能够并行执行不同指令的相应操作</strong></li>
<li><strong>每一步骤称为流水级或流水段</strong></li>
<li><strong>流水级前后相连形成流水线，指令从一端进入，依次通过流水级，在另一端流出</strong></li>
<li><strong>所有流水级都必须同时工作</strong></li>
</ul>
<h2 id="%E6%8C%87%E4%BB%A4%E6%89%A7%E8%A1%8C%E5%90%9E%E5%90%90%E7%8E%87">指令执行吞吐率</h2>
<ul>
<li><strong>非流水线</strong>：<code>1/(T+R)</code></li>
<li><strong>流水线</strong>：<code>1/(T/K+R)</code></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p013.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="14" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="risc-v%E6%95%B4%E6%95%B0%E6%B5%81%E6%B0%B4%E7%BA%BF">RISC-V整数流水线</h2>
<ul>
<li><strong>实现载入、存储、分支和ALU指令类型</strong></li>
<li><strong>五阶段指令执行过程</strong>：
<ul>
<li>IF（指令获取）</li>
<li>ID（指令解码/读寄存器）</li>
<li>EX（逻辑运算）</li>
<li>MEM（存取内存）</li>
<li>WB（写寄存器）</li>
</ul>
</li>
<li><strong>每条指令仍需要5个周期执行完成，但每个时钟周期内5个流水线段执行5条不同指令</strong></li>
<li><strong>每条指令的上下文数据随着指令一起流动</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p014.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="15" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch3p015.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="15" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="content">
<h2 id="%E4%BA%94%E9%98%B6%E6%AE%B5%E6%8C%87%E4%BB%A4%E6%89%A7%E8%A1%8C%E8%BF%87%E7%A8%8B">五阶段指令执行过程</h2>
<h3 id="1%E6%8C%87%E4%BB%A4%E6%8F%90%E5%8F%96%E5%91%A8%E6%9C%9Fif">（1）指令提取周期（IF）</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-assembly">IR←Mem[PC]
NPC←PC+4
</code></pre>
<h3 id="2%E6%8C%87%E4%BB%A4%E8%AF%91%E7%A0%81%E5%AF%84%E5%AD%98%E5%99%A8%E6%8F%90%E5%8F%96%E5%91%A8%E6%9C%9Fid">（2）指令译码/寄存器提取周期（ID）</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-assembly">A←Regs[rs1]
B←Regs[rs2]
Imm←符号扩展IR中的立即数
</code></pre>
<h3 id="3%E6%89%A7%E8%A1%8C%E6%9C%89%E6%95%88%E5%9C%B0%E5%9D%80%E5%91%A8%E6%9C%9Fex">（3）执行/有效地址周期（EX）</h3>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="15" style="" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="16" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch3p016.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="16" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="content">
<h2 id="%E5%AD%98%E5%82%A8%E8%AE%BF%E9%97%AE%E4%B8%8E%E5%86%99%E5%9B%9E%E5%91%A8%E6%9C%9F">存储访问与写回周期</h2>
<h3 id="4%E5%AD%98%E5%82%A8%E8%AE%BF%E9%97%AE%E5%91%A8%E6%9C%9Fmem">（4）存储访问周期（MEM）</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-assembly">LMD←Mem[ALUOutput]  或  Mem[ALUOutput]←B
</code></pre>
<h3 id="5%E5%86%99%E5%9B%9E%E5%91%A8%E6%9C%9Fwb">（5）写回周期（WB）</h3>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="16" style="" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="17" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E6%AE%B5%E7%BA%A7%E5%AF%84%E5%AD%98%E5%99%A8%E7%9A%84%E4%BA%94%E6%AE%B5%E6%B5%81%E6%B0%B4%E7%BA%BF">段级寄存器的五段流水线</h2>
<ul>
<li><strong>级间寄存器、多路选择器</strong></li>
<li><strong>每个流水阶段上的事件</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p017.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="18" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E6%B5%81%E6%B0%B4%E7%BA%BF%E5%A4%84%E7%90%86%E7%BB%93%E6%9E%84%E7%89%B9%E5%BE%81">流水线处理结构特征</h2>
<ul>
<li><strong>从时空图角度抽象</strong></li>
<li><strong>从流水线控制处理过程抽象</strong>
<ul>
<li>控制路径</li>
<li>数据路径</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch3p018.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="19" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E6%B5%81%E6%B0%B4%E7%BA%BF%E6%B7%B1%E5%BA%A6%E9%99%90%E5%88%B6%E5%9B%A0%E7%B4%A0">流水线深度限制因素</h2>
<ul>
<li><strong>流水线中流水级之间的失衡和流水化开销会限制流水线深度</strong></li>
<li><strong>流水线时钟周期包含流水线寄存器延迟和时钟偏差</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p019.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="20" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch3p020.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="20" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="content">
<h2 id="%E4%BA%94%E6%AE%B5%E6%B5%81%E6%B0%B4%E7%BA%BF%E6%97%B6%E7%A9%BA%E5%9B%BE">五段流水线时空图</h2>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="20" style="" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="21" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E6%B5%81%E6%B0%B4%E7%BA%BF%E5%86%B2%E7%AA%81hazard">流水线冲突（Hazard）</h2>
<ul>
<li><strong>现实流水线中存在指令之间的冲突（hazard），达不到理想加速比</strong></li>
<li><strong>hazard表达有潜在冲突的可能，只有特定情况才会发生</strong></li>
<li><strong>主要有三类流水线冲突</strong>：
<ul>
<li><strong>结构冲突</strong>：多条指令重叠执行时，同时竞争某一硬件部件</li>
<li><strong>数据冲突</strong>：并发执行的前后指令访问相同的数据</li>
<li><strong>控制冲突</strong>：分支指令及其他改变程序计数器的指令会改变指令流</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch3p021.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="22" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E5%86%B2%E7%AA%81%E9%81%BF%E5%85%8D%E5%8E%9F%E5%88%99">冲突避免原则</h2>
<ul>
<li><strong>为了避免冲突，流水线控制经常停顿一些指令的执行，让其他指令能够继续执行</strong></li>
<li><strong>一般原则是后面的指令让前面的指令先执行</strong></li>
<li><strong>当一条指令被停顿时，之前的指令继续执行，而其后的所有指令也被停顿</strong></li>
<li><strong>这也会导致指令发射暂停，导致流水线性能下降</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p022.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="23" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E7%BB%93%E6%9E%84%E5%86%B2%E7%AA%81">结构冲突</h2>
<ul>
<li><strong>结构冲突是指流水线方式工作时，多条并发指令组合存在硬件资源冲突</strong></li>
<li><strong>解决方法</strong>：
<ul>
<li><strong>增加空间并行度</strong>（增加硬件资源）</li>
<li><strong>增加时间并行度</strong>（细化流程进行流水化）</li>
<li><strong>停顿指令</strong></li>
</ul>
</li>
<li><strong>单内存端口结构冲突的解决</strong>：
<ul>
<li>指令和数据提供独立的存储器访问</li>
<li>分离指令缓存和数据缓存（Harvard结构）</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch3p023.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="24" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch3p024.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="24" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="content">
<h2 id="harvard%E7%BB%93%E6%9E%84%E6%B5%81%E6%B0%B4%E7%BA%BF">Harvard结构流水线</h2>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="24" style="" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="25" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E6%95%B0%E6%8D%AE%E5%86%B2%E7%AA%81">数据冲突</h2>
<ul>
<li><strong>数据冲突就是流水线中前后指令存取操作数的时序不同于程序顺序执行的时序</strong></li>
<li><strong>三种数据冲突</strong>：
<ul>
<li><strong>I1读、I2写</strong>（简写为WAR）</li>
<li><strong>I1写、I2读</strong>（简写为RAW）</li>
<li><strong>I1写、I2写</strong>（简写为WAW）</li>
<li>RAR没有影响</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch3p025.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="26" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E9%87%8D%E5%AE%9A%E5%90%91%E6%8A%80%E6%9C%AFforwarding">重定向技术（Forwarding）</h2>
<ul>
<li><strong>一种消除真数据相关的方法是重定向（forwarding）技术</strong></li>
<li><strong>来自EX/MEM和MEM/WB流水线寄存器的ALU结果总是被送到ALU的输入端</strong></li>
<li><strong>转发硬件检测到前ALU操作已经对当前ALU操作的源寄存器进行了写入操作，则控制逻辑选择转发结果作为ALU输入</strong></li>
<li><strong>采用转发技术后，如果sub停顿，则add将会完成，不会触发旁路</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p026.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="27" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E8%BD%AC%E5%8F%91%E6%8A%80%E6%9C%AF%E7%9A%84%E6%8E%A8%E5%B9%BF">转发技术的推广</h2>
<ul>
<li><strong>转发技术加以推广，将结果直接传送给需要它的功能单元</strong></li>
<li><strong>MEM级也可能需要定向技术</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p027.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="28" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch3p028.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="28" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="content">
<h2 id="%E8%BD%BD%E5%85%A5%E6%8C%87%E4%BB%A4%E7%9A%84%E5%BB%B6%E8%BF%9F">载入指令的延迟</h2>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="28" style="" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="29" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E6%9D%A1%E4%BB%B6%E5%88%86%E6%94%AF%E5%A4%84%E7%90%86">条件分支处理</h2>
<ul>
<li><strong>分支必须执行之后，才能确定下一条指令</strong></li>
<li><strong>分支成功导致后续指令作废，需要从分支目标读取新指令</strong></li>
<li><strong>3个周期延迟，2个停顿</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-assembly">10: beq r1,r3,36
14: and r2,r3,r5
18: or r6,r1,r7
22: add r8,r1,r9
36: xor r10,r1,r11
</code></pre>
</div>
<div>
<p><img src="images/Ch3p029.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="30" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E5%88%86%E6%94%AF%E5%A4%84%E7%90%86%E6%9C%BA%E5%88%B6">分支处理机制</h2>
<ul>
<li><strong>确定分支方向和分支目标地址的工作放到ID阶段完成</strong></li>
<li><strong>预测分支不成功</strong>：尽早确定分支（1个周期停顿）</li>
<li><strong>分支处理机制</strong>：
<ul>
<li>停顿机制</li>
<li>预测分支不成功</li>
<li>预测分支成功</li>
</ul>
</li>
<li><strong>分支延迟槽</strong>：隐藏分支延迟</li>
</ul>
</div>
<div>
<p><img src="images/Ch3p030.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="31" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E5%88%86%E6%94%AF%E5%BB%B6%E8%BF%9F%E6%A7%BD%E7%9A%84%E8%B0%83%E5%BA%A6">分支延迟槽的调度</h2>
<ul>
<li><strong>(a) 来自分支之前</strong></li>
<li><strong>(b) 来自目标</strong></li>
<li><strong>(c) 来自不成功指令</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p031.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="32" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch3p032.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="32" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="content">
<h2 id="%E9%9D%99%E6%80%81%E5%88%86%E6%94%AF%E9%A2%84%E6%B5%8B">静态分支预测</h2>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="32" style="" data-marpit-pagination-total="56" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="33" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E5%88%86%E6%94%AF%E9%A2%84%E6%B5%8B%E6%96%B9%E6%B3%95">分支预测方法</h2>
<ul>
<li><strong>当流水线变深，且分支潜在代价增加时，需更有效的方式来预测分支</strong></li>
<li><strong>编译时静态分支预测</strong></li>
<li><strong>运行时动态分支预测</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p033.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="34" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E9%9D%99%E6%80%81%E5%88%86%E6%94%AF%E9%A2%84%E6%B5%8B%E5%88%86%E6%9E%90">静态分支预测分析</h2>
<ul>
<li><strong>优化编译时分支预测的一种重要方式是分析先前运行过程收集的实际分支行为（Trace过程）</strong></li>
<li><strong>根据结果对于分支进行静态预测</strong></li>
<li><strong>经常表现为双峰分布</strong></li>
<li><strong>不同类型的分支经常明显偏向于成功或不成功两种情况之一</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p034.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="35" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E5%8A%A8%E6%80%81%E5%88%86%E6%94%AF%E9%A2%84%E6%B5%8B">动态分支预测</h2>
<ul>
<li><strong>标识分支</strong>：当分支流不断到达时，通过分支地址识别分支，记录分支历史信息</li>
<li><strong>预测分支</strong>：设计分支预测器对于每个分支进行预测</li>
<li><strong>反馈修正</strong>：在分支确定之后，通过反馈更新分支预测器（一种机器学习的方法）</li>
</ul>
</div>
<div>
<p><img src="images/Ch3p035.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="36" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E5%88%86%E6%94%AF%E5%8E%86%E5%8F%B2%E8%A1%A8">分支历史表</h2>
<ul>
<li><strong>分支历史表是一个小型存储器，根据分支指令地址的低位部分进行索引</strong></li>
<li><strong>每个分支预测记录包含N位，记录该分支最近是否成功</strong></li>
<li><strong>1位分支历史预测机制在一次循环中可能会得到两次错误预测</strong></li>
<li><strong>可以采用多位，例如2位分支历史表</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p036.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="37" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E5%88%86%E6%94%AF%E9%A2%84%E6%B5%8B%E5%87%86%E7%A1%AE%E5%BA%A6">分支预测准确度</h2>
<ul>
<li><strong>对于SPEC89基准测试，4096项2位预测缓冲区的预测准确度</strong></li>
<li><strong>4096项2位预测缓冲区与无限缓冲区下的预测准确度对比</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p037.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="38" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E5%88%86%E6%94%AF%E7%9B%AE%E6%A0%87%E7%BC%93%E5%86%B2">分支目标缓冲</h2>
<ul>
<li><strong>仅能成功预测分支，没有分支目标地址，无法降低流水线分支代价</strong></li>
<li><strong>如果能尽早识别分支指令，预测其分支成功，且知道相应PC地址，就可以将分支代价降为零</strong></li>
<li><strong>分支目标缓冲</strong>：缓存一条分支之后下一条指令的预测地址</li>
<li><strong>五级流水线使用分支目标缓冲区的流程</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p038.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="39" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E5%88%86%E6%94%AF%E7%9B%AE%E6%A0%87%E7%BC%93%E5%86%B2%E8%AF%84%E4%BC%B0">分支目标缓冲评估</h2>
<ul>
<li><strong>若要评估一个分支目标缓冲区的工作情况，必须首先判断所有可能情况的代价</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p039.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="40" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E8%BF%94%E5%9B%9E%E5%9C%B0%E5%9D%80%E9%A2%84%E6%B5%8B%E4%B8%8E%E9%9B%86%E6%88%90%E6%8C%87%E4%BB%A4%E6%8F%90%E5%8F%96%E5%8D%95%E5%85%83">返回地址预测与集成指令提取单元</h2>
<ul>
<li><strong>返回地址预测器</strong>：高级语言程序中间接过程调用、选择或case语句、FORTRAN计算的goto语句等都会产生间接跳转</li>
<li><strong>集成指令提取单元</strong>：在多发射处理器中，需要一个集成了多种功能的集成指令提取单元
<ul>
<li>集成分支预测</li>
<li>指令预取</li>
<li>指令缓存访问</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch3p040.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="41" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E6%B5%81%E6%B0%B4%E7%BA%BF%E6%8E%A7%E5%88%B6%E5%AE%9E%E7%8E%B0">流水线控制实现</h2>
<ul>
<li><strong>为了控制这一简单流水线，需要设定4个多路选择器的控制方式</strong></li>
<li><strong>ALU级的2个多路选择器根据指令类型设定，由ID/EX寄存器的IR字段确定</strong></li>
<li><strong>将一条指令从ID段移入EX段的过程通常称为指令发射，EX段及后面的指令称为已发射</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p041.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="42" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E6%B5%81%E6%B0%B4%E7%BA%BF%E5%81%9C%E9%A1%BF%E4%B8%8E%E4%BA%92%E9%94%81">流水线停顿与互锁</h2>
<ul>
<li><strong>当使用载入结果的指令位于ID级时，检测到互锁的逻辑</strong></li>
<li><strong>一旦检测到冲突，控制单元必须插入流水线停顿，并防止IF和ID级中的指令继续前进</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p042.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="43" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E9%87%8D%E5%AE%9A%E5%90%91%E9%80%BB%E8%BE%91%E5%AE%9E%E7%8E%B0">重定向逻辑实现</h2>
<ul>
<li><strong>实现重定向逻辑，关键是要注意到流水线寄存器中既包含了要重定向的数据，也包含了源、目标寄存器字段</strong></li>
<li><strong>可以从ALU结果（EX/MEM中或MEM/WB中）或从MEM/WB中的载入结果向两个ALU输入重定向数据</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p043.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="44" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E5%BC%82%E5%B8%B8%E7%B1%BB%E5%9E%8B">异常类型</h2>
<ul>
<li><strong>异常处理也会改变控制流</strong></li>
<li><strong>当很多类型的事件会导致异常，中断当前指令的执行</strong>：
<ol>
<li>I/O设备处理</li>
<li>用户程序调用操作系统服务</li>
<li>跟踪指令执行</li>
<li>断点（程序员请求的中断）</li>
<li>整数算术溢出</li>
<li>浮点算术异常</li>
<li>页面错误</li>
<li>存储器访问未对齐</li>
<li>违反存储器保护规则</li>
<li>使用未定义或未实现的指令</li>
<li>硬件故障</li>
<li>电源故障</li>
</ol>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch3p044.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="45" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E5%BC%82%E5%B8%B8%E5%88%86%E7%B1%BB">异常分类</h2>
<ul>
<li><strong>同步与异步</strong></li>
<li><strong>用户请求与强制</strong></li>
<li><strong>程序可屏蔽与用户不可屏蔽</strong></li>
<li><strong>指令内部与指令之间</strong></li>
<li><strong>恢复与终止</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p045.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="46" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E5%BC%82%E5%B8%B8%E5%A4%84%E7%90%86%E9%9A%BE%E7%82%B9%E4%B8%8E%E7%B2%BE%E7%A1%AE%E5%BC%82%E5%B8%B8">异常处理难点与精确异常</h2>
<ul>
<li><strong>异常处理难点</strong>：可能乱序发生；必须可以正确返回</li>
<li><strong>在发生异步时，流水线控制可以采取以下步骤安全地保存流水线状态</strong>：
<ol>
<li>在下一个IF向流水线中强制插入一个自陷指令</li>
<li>禁止错误指令的所有写入操作，禁止流水线中后续所有指令的写入操作</li>
<li>异常处理例程保存故障指令的PC</li>
</ol>
</li>
<li><strong>精确异常处理能力</strong>：如果流水线可以停止，使错误指令之前的指令能够完成，使其之后的指令可以从头重新启动</li>
</ul>
</div>
<div>
<p><img src="images/Ch3p046.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="47" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E6%B5%81%E6%B0%B4%E7%BA%BF%E4%B8%AD%E7%9A%84%E5%BC%82%E5%B8%B8">流水线中的异常</h2>
<ul>
<li><strong>RISC-V流水级，以及每一级中可能发生的异常</strong></li>
<li><strong>采用流水化时，由于有多条指令重叠执行，同一时钟周期中可能出现多个异常</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p047.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="48" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E6%B5%AE%E7%82%B9%E6%B5%81%E6%B0%B4%E7%BA%BF">浮点流水线</h2>
<ul>
<li><strong>浮点需要执行多个周期或耗费大量逻辑电路单周期实现</strong></li>
<li><strong>浮点多周期流水线实现</strong>：
<ul>
<li>重复使用EX单元</li>
<li>计算过程进一步流水化</li>
</ul>
</li>
<li><strong>假定RISC-V实现中有以下4个独立的功能单元</strong>：
<ul>
<li>整型数据处理单元</li>
<li>浮点与整数乘法器</li>
<li>浮点加法器</li>
<li>浮点和整型除法器</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch3p048.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="49" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E6%B5%AE%E7%82%B9%E6%B5%81%E6%B0%B4%E7%BA%BF%E7%9A%84%E5%90%AF%E5%8A%A8%E9%97%B4%E9%9A%94">浮点流水线的启动间隔</h2>
<ul>
<li><strong>EX段设计成流水方式，允许浮点计算部件的流水化，并允许多个操作重叠进行</strong></li>
<li><strong>通常不能一个周期发射一条指令，而是有启动间隔（或称重复间隔）</strong></li>
<li><strong>起始间隔或重复间隔是指在发出两个特定类型的操作之间必须间隔的周期数</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p049.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="50" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E6%B5%AE%E7%82%B9%E5%86%B2%E7%AA%81%E6%A3%80%E6%B5%8B%E4%B8%8E%E9%87%8D%E5%AE%9A%E5%90%91">浮点冲突检测与重定向</h2>
<ul>
<li><strong>因为除法单元未被完全流水化，所以可能发生结构冲突</strong></li>
<li><strong>因为指令的运行时间不同，所以一个周期内可能有多个寄存器写</strong></li>
<li><strong>由于指令不会按序到达WB，所以可能存在WAW冲突</strong></li>
<li><strong>由于操作延迟较长，所以RAW冲突的停顿将会变得更为频繁</strong></li>
<li><strong>指令的完成顺序可能不同于其发射顺序</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p050.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="51" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E4%B9%B1%E5%BA%8F%E5%AE%8C%E6%88%90%E4%B8%8E%E5%BC%82%E5%B8%B8">乱序完成与异常</h2>
<ul>
<li><strong>指令的完成顺序可能不同于其发射顺序</strong></li>
<li><strong>假定在fadd.d已经完成而fdiv.d还未完成时，fsub.d导致了浮点算术异常，会出现不精确异常</strong></li>
<li><strong>三种可能方法来处理乱序完成情况</strong>：
<ol>
<li>忽略问题，容忍非精确异常</li>
<li>缓冲操作的结果</li>
<li>允许异常变得不十分精确，但保存足够的信息</li>
</ol>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch3p051.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="52" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="r4000%E6%B5%AE%E7%82%B9%E6%B5%81%E6%B0%B4%E7%BA%BF">R4000浮点流水线</h2>
<ul>
<li><strong>R4000浮点流水线中使用的8个流水级</strong></li>
<li><strong>浮点运算的延迟和初始间隔都取决于给定运算必须使用的浮点功能级</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p052.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="53" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E6%B5%AE%E7%82%B9%E8%BF%90%E7%AE%97%E8%B0%83%E5%BA%A6">浮点运算调度</h2>
<ul>
<li><strong>如果加法指令在浮点除法指令结束时启动，该浮点除法可能导致该加法指令的停顿</strong></li>
<li><strong>在加法之后发射的乘法总是可以无停顿继续进行</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p053.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="54" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="56" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E9%99%84%E5%BD%95%E5%8F%82%E8%80%83">附录参考</h2>
<ul>
<li><strong>附录C进一步补充了流水线相关的知识，并按照本章相关主题进行了分类</strong></li>
<li><strong>在附录C.3添加描述了分支预测实例</strong></li>
<li><strong>在附录C.4在流水线实现部分扩展讨论了流水线的异常处理</strong></li>
<li><strong>在附录C.5增加介绍了浮点流水线</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch3p054.png" alt="" style="width:520px;" /></p>
