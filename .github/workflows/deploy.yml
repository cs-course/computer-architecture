name: Build & Deploy

# Only trigger on .md source changes or this workflow file.
# Compiled HTML is pushed as .html files, which do NOT match '**.md',
# so this workflow does NOT trigger itself in a loop.
on:
  push:
    branches:
      - main
    paths:
      - '**.md'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install marp-cli
        run: npm install -g @marp-team/marp-cli@4.3.1

      # Compile index page → index.html (root)
      - name: Compile index page
        run: npx @marp-team/marp-cli index.md --html --output ./index.html

      # Compile each chapter → ChN/index.html (subdirectory, images resolve correctly)
      - name: Compile Ch1 - 计算机系统结构概述
        run: npx @marp-team/marp-cli Ch1/Ch1_计算机系统结构概述.md --html --output ./Ch1/index.html

      - name: Compile Ch2 - 指令系统
        run: npx @marp-team/marp-cli Ch2/Ch2_指令系统.md --html --output ./Ch2/index.html

      - name: Compile Ch3 - 流水线处理器
        run: npx @marp-team/marp-cli Ch3/Ch3_流水线处理器.md --html --output ./Ch3/index.html

      - name: Compile Ch4 - 指令级并行处理
        run: npx @marp-team/marp-cli Ch4/Ch4_指令级并行处理.md --html --output ./Ch4/index.html

      - name: Compile Ch5 - 内存系统
        run: npx @marp-team/marp-cli Ch5/Ch5_内存系统.md --html --output ./Ch5/index.html

      - name: Compile Ch6 - 外存系统
        run: npx @marp-team/marp-cli Ch6/Ch6_外存系统.md --html --output ./Ch6/index.html

      - name: Compile Ch7 - 数据级并行
        run: npx @marp-team/marp-cli Ch7/Ch7_数据级并行.md --html --output ./Ch7/index.html

      - name: Compile Ch8 - 多处理器
        run: npx @marp-team/marp-cli Ch8/Ch8_多处理器.md --html --output ./Ch8/index.html

      - name: Compile Ch9 - 计算机集群和数据中心
        run: npx @marp-team/marp-cli Ch9/Ch9_计算机集群和数据中心.md --html --output ./Ch9/index.html

      - name: Compile Ch10 - 专用加速器
        run: npx @marp-team/marp-cli Ch10/Ch10_专用加速器.md --html --output ./Ch10/index.html

      # Commit & push
      - name: Configure Git identity
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push compiled HTML
        run: |
          git add \
            index.html \
            Ch1/index.html Ch1/images/ \
            Ch2/index.html Ch2/images/ \
            Ch3/index.html Ch3/images/ \
            Ch4/index.html Ch4/images/ \
            Ch5/index.html Ch5/images/ \
            Ch6/index.html Ch6/images/ \
            Ch7/index.html Ch7/images/ \
            Ch8/index.html Ch8/images/ \
            Ch9/index.html Ch9/images/ \
            Ch10/index.html Ch10/images/ \
            images/
          if git diff --cached --quiet; then
            echo "No HTML changes to commit — skipping push."
          else
            git commit -m "chore: recompile HTML $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            git push origin main
            echo "Pushed compiled HTML to origin/main"
          fi
