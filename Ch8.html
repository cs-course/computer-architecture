 section[data-marpit-advanced-background="background"] > div[data-marpit-advanced-background-container] > figure > figcaption{position:absolute;border:0;clip:rect(0, 0, 0, 0);height:1px;margin:-1px;overflow:hidden;padding:0;white-space:nowrap;width:1px}div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background="content"], div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background="pseudo"]{background:transparent!important}div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background="pseudo"], div#\:\$p > svg[data-marpit-svg] > foreignObject[data-marpit-advanced-background="pseudo"]{pointer-events:none!important}div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background-split]{width:100%;height:100%}
</style></head><body><div class="bespoke-marp-osc"><button data-bespoke-marp-osc="prev" tabindex="-1" title="Previous slide">Previous slide</button><span data-bespoke-marp-osc="page"></span><button data-bespoke-marp-osc="next" tabindex="-1" title="Next slide">Next slide</button><button data-bespoke-marp-osc="fullscreen" tabindex="-1" title="Toggle fullscreen (f)">Toggle fullscreen</button><button data-bespoke-marp-osc="overview" tabindex="-1" title="Toggle overview view (o)">Toggle overview view</button><button data-bespoke-marp-osc="presenter" tabindex="-1" title="Open presenter view (p)">Open presenter view</button></div><div id=":$p"><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-class="lead" data-theme="gaia" lang="C" class="lead" data-marpit-pagination="1" style="--paginate:true;--class:lead;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch8p001.png&quot;);background-size:contain;filter:opacity(0.15);"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="1" data-paginate="true" data-class="lead" data-theme="gaia" lang="C" class="lead" data-marpit-pagination="1" style="--paginate:true;--class:lead;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="content">
<h1 id="%E5%A4%9A%E5%A4%84%E7%90%86%E5%99%A8">多处理器</h1>
<p><strong>计算机系统结构</strong><br />
</p>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-class="lead" data-theme="gaia" lang="C" class="lead" data-marpit-pagination="1" style="" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="2" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<h2 id="%E6%9C%AC%E7%AB%A0%E5%86%85%E5%AE%B9">本章内容</h2>
<ul>
<li><strong>掌握多处理器概念和基本结构</strong></li>
<li><strong>掌握多处理器中的互连网络架构及性能分析</strong></li>
<li><strong>掌握缓存一致性概念及监听一致性协议原理</strong></li>
<li><strong>掌握同步概念及其实现方式</strong></li>
<li><strong>理解存储顺序一致性概念</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="3" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>单处理器性能提升速率减缓，近年年增长率仅为2.9%，单处理器性能有限</strong></li>
<li><strong>通过增加处理器个数或者处理器核数增加整体计算能力</strong></li>
<li><strong>2003年之后，从低端到高端的各类处理器普遍采用多核、多处理器体系结构</strong></li>
<li><strong>多处理器属于MIMD模型，其每个核/处理器是通用的，可以独立执行程序，提供线程级并行（Thread-Level Parallelism，TLP）</strong></li>
<li><strong>共享网络和全局多级存储（缓存、内存和外存）连接在一起</strong></li>
<li><strong>多处理器通过两种不同的软件模型来开发TLP：</strong>
<ul>
<li>任务级并行处理（Job-Level Parallelism，JLP）：运行一组紧密耦合的线程，协同完成同一项任务</li>
<li>请求级并行(Request-Level Parallelism，RLP)：执行可能由一或多位用户发起的多个相对独立的进程</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch8p003.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="4" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>多处理器体系结构可以从其存储器物理组织结构进行分类：</strong>
<ul>
<li>集中式共享存储器结构（也称为对称（共 享存储器）多处理器，symmetric shared-memory multiprocessors，SMP）</li>
<li>分布式存储器结构（Distributed Shared Memory，DSM）：通过高速互连网络连接多个处理器结点</li>
</ul>
</li>
<li><strong>分布式共享存储结构中每个处理器结点包含：独立的处理器、存储器、I/O和网络接口，处理器能够共享分散式存储器</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch8p004.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="5" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>从存储地址逻辑空间组织结构方面进行分类。这是程序员能够看到的存储地址空间，总体分为两类：全局共享地址空间和独立分布式地址空间</strong></li>
<li><strong>全局共享地址空间优势：</strong>
<ol>
<li>能够与常用的对称式多处理机很好的配合</li>
<li>易于编程，采用单一存储空间模型开发应用程序</li>
<li>简化编译器设计</li>
<li>当通信数据量较小时，通信开销较低，带宽利用较好</li>
<li>可以采用Cache机制来减少远程通信的频度，减少了通信延迟以及对共享数据的访问冲突</li>
</ol>
</li>
<li><strong>独立分布式内存地址空间结构是指整个系统的存储地址空间是由多个独立内存编址空间构成</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch8p005.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="6" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>处理器通信机制分为两类：共享存储器通信机制和消息传递通信机制</strong></li>
<li><strong>共享存储通信机制：基于全局共享地址空间，各个处理器用load和store指令对全局共享的存储地址进行存储-载入操作</strong></li>
<li><strong>消息传递通信机制：基于独立地址空间，处理器访问各个独立存储空间时，需要显式地传递消息</strong></li>
<li><strong>分为同步消息传递和异步消息传递：</strong>
<ul>
<li>同步消息传递：请求处理器发送消息后一直要等到应答完成才继续运行</li>
<li>异步消息传递：请求处理器发送消息后可以处理其他事情</li>
</ul>
</li>
<li><strong>消息传递通信机制优点：硬件简单、通信显式容易分析、编程者可以参与开发并行程序、同步操作与发送消息关联减少同步错误</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch8p006.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="7" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>早期，多个处理器和存储器通过共享总线互连，是典型的SMP结构</strong></li>
<li><strong>近年，多核处理器迅速发展，多个核心也通过共享总线互连</strong></li>
<li><strong>目前大多数多核多路高性能服务器中，往往采用NUMA结构，前端总线（QPI）实现CPU之间的互连</strong></li>
<li><strong>CPU通过内存总线和内存直接相连</strong></li>
<li><strong>CPU通过I/O总线连接高速设备，这些总线控制器都集成到处理器中</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="8" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>并行较难实现</strong>
<ul>
<li>程序内部并行度可能有限</li>
<li>处理器之间通信的成本较高</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="9" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>并行度不足、远程通信开销大是多处理器性能提升的难点</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="10" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>互联网络是计算机部件、计算机节点或计算机系统之间的链接</strong></li>
<li><strong>可能连接：CPU处理器内的多个核、多个CPU处理器、CPU处理器和存储器、一个CPU内存和其他CPU内存、多个计算机、甚至多个计算机网</strong></li>
<li><strong>是SIMD计算机和MIMD计算机的关键组成部分</strong></li>
<li><strong>理解互联网络能够更好的设计和评价计算机系统</strong></li>
<li><strong>互连网络的主要设计目标是：在成本、能耗等约束下，在尽可能短的时间内传输更可能多的数据，避免成为系统的瓶颈</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="11" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>互连网络分为四种类型：</strong>
<ul>
<li><strong>片上网络（On-chip networks，OCNs）</strong>：主要用于芯片内微架构内功能单元的互连，包括片内寄存器文件、缓存、计算模块以及功能IP模块</li>
<li><strong>系统/存储区域网络（System/storage area networks，SANs）</strong>：用于多处理器之间、处理器-内存互连，也用于连接服务器和数据中心环境中的存储和I/O组件</li>
<li><strong>局域网（Local area networks，LANs）</strong>：用于在机房、整个建筑物或校园环境中互连计算机，可以将PC互连成集群</li>
<li><strong>广域网（Wide area networks，WANs）</strong>：连接分布在全球的计算机系统</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch8p012.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="12" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>互连网络的性能指标：评估互连网络性能的两个基本指标是时延和带宽</strong></li>
<li><strong>通信时延：指从源结点到目的结点传送一条消息所需的总时间</strong>
<ul>
<li>通信延迟 = 软件开销 + 通道时延 + 选路时延 + 竞争时延</li>
</ul>
</li>
<li><strong>网络时延：通道时延与选路时延的和，由网络硬件特征决定，与程序行为和网络传输状态无关</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="13" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>通信延迟模型：</strong>
<ul>
<li>发送开销 + 飞行时间 + 网络传输时间 + 接收开销</li>
<li>网络传输时间 = 数据包大小 / 带宽</li>
<li>飞行时间由光速和距离决定</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="14" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch8p015.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="14" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="14" style="" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="15" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>网络拓扑结构可以使用图表示，通过有向边或无向边描述节点间的连接关系</strong></li>
<li><strong>网络拓扑结构的几个关键参数：</strong>
<ul>
<li><strong>网络规模</strong>：网络中结点的个数，表示该网络所能链接的部件的数量</li>
<li><strong>结点度</strong>：与结点相连接的边数，可以进一步分为入度和出度</li>
<li><strong>结点距离</strong>：网络中任意两个结点间通路所经历边数的最小值</li>
<li><strong>网络直径D</strong>：网络中任意两结点间距离的最大值，网络直径应当尽可能地小</li>
<li><strong>等分宽度b</strong>：当把一个N结点网络切分为结点数相同的两部分时，沿切口边数的最小值
<ul>
<li>线等分宽度：B = b × w，w为通道宽度（用位表示）</li>
</ul>
</li>
<li><strong>对称性</strong>：如果从任何结点看，网络拓扑结构都相同的，就称为对称网络</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="16" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>互联网络可以看成是输入节点到输出节点之间的一组互连映射关系，可以用互联函数进行形式化表示</strong></li>
<li><strong>在互联函数f的作用下，输入端x连接到输出端f(x)</strong></li>
<li><strong>互连函数反映了网络输入数组和输出数组之间对应的置换关系或排列关系（置换函数或排列函数）</strong></li>
<li><strong>互连函数有多种表示方式，一个网络通过开关切换可以形成多个映射关系，所以要用&quot;互连函数族&quot;来定义一个网络</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="17" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>互联函数f(x)采用循环表示</strong></li>
<li><strong>j称为该循环的长度，即：（x₀ x₁ x₂ ... xⱼ₋₁）</strong></li>
<li><strong>表示：f(x₀)=x₁, f(x₁)=x₂, ..., f(xⱼ₋₁)=x₀</strong></li>
<li><strong>设n=log₂N，则可以用n位二进制来表示N个输入端和输出端的二进制地址</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="18" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>恒等函数I：实现同号输入端和输出端之间的连接</strong></li>
<li><strong>交换函数E：实现二进制地址编码中第k位互反的输入端和输出端之间的连接</strong></li>
<li><strong>网络结点个数为N时，共有N种互连函数，通常用Cubeₖ来表示对结点二进制地址第k位形成的连接关系</strong></li>
<li><strong>当k=N=8, n=3时，称之为立方体函数</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="19" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch8p022.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="19" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="19" style="" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="20" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>均匀洗牌函数σ(x)：将输入端分成数目相等的两半，按类似均匀混洗扑克牌的方式，交叉地连接到输出端，也称为混洗函数</strong></li>
<li><strong>σ函数就是把输入端的二进制编号循环左移一位</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="21" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>子函数和超函数：</strong>
<ul>
<li>互连函数的第k个子函数：把该函数作用于输入端的二进制编号的低k位</li>
<li>互连函数的第k个超函数：把该函数作用于输入端的二进制编号的高k位</li>
</ul>
</li>
<li><strong>对于均匀洗牌函数：</strong>
<ul>
<li>第k个子函数：即把输入端的二进制编号中的低k位循环左移一位</li>
<li>第k个超函数：即把输入端的二进制编号中的高k位循环左移一位</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="22" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>逆函数：对于任意一种函数f(x)，如果存在g(x)，使得f(x)×g(x)=I(x)，则称g(x)是f(x)的逆函数，记为f⁻¹(x)</strong></li>
<li><strong>逆均匀洗牌函数f⁻¹(x)：将输入端的二进制编号循环右移一位而得到所连接的输出端编号</strong></li>
<li><strong>互联函数：σ⁻¹(x) = σ(xₙ₋₁ x₀ x₁ ... xₙ₋₂)</strong></li>
<li><strong>逆均匀洗牌是均匀洗牌的逆函数</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="23" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch8p026.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="23" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="23" style="" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="24" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch8p027.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="24" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="24" style="" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="25" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>蝶式函数（β）：把输入端的二进制编号的最高位与最低位互换位置，便得到了输出端的编号</strong></li>
<li><strong>第k个子函数和第k个超函数</strong></li>
<li><strong>蝶式变换与交换变换的多级组合是构成多级立方体网络的基础</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="26" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>反位序函数：将输入端二进制编号的位序颠倒过来求得相应输出端的编号</strong></li>
<li><strong>反位序函数：β(xₙ₋₁ ... x₁ x₀) = (x₀ x₁ ... xₙ₋₁)</strong></li>
<li><strong>第k个子函数和第k个超函数</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="27" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch8p030.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="27" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="27" style="" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="28" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>移数函数：将各输入端都错开一定的位置（模N）后连到输出端</strong></li>
<li><strong>移数函数：PM2₊ᵢ(x) = (x + 2ⁱ) mod N</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="29" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>PM2ᵢ函数（加减2ⁱ函数）：</strong>
<ul>
<li>P和M分别表示加和减，2ⁱ表示2的i次方</li>
<li>PM2ᵢ函数：一种移数函数，将各输入端都错开一定的位置（模N）后连到输出端</li>
<li>PM2ᵢ互连网络共有2n个互连函数</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="30" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch8p033.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="30" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="30" style="" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="31" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>例题：现有16个处理器（编号0, 1, ..., 15），用一个N=16的互连网络互连</strong></li>
<li><strong>处理器i的输出通道连接互连网络的输入端i，处理器i的输入通道连接互连网络的输出端i</strong></li>
<li><strong>当该互连网络实现的互连函数分别为Cube₃, PM2₊₃, PM2⁻₀, σ, σ²时，分别给出与第13号处理器所连接的处理器号</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="32" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>互连网络通常可以分为两大类：</strong>
<ul>
<li><strong>静态互连网络</strong>：各结点之间有固定的连接通路、且在运行中不能改变的网络</li>
<li><strong>动态互连网络</strong>：由交换开关构成、可按运行程序的要求动态地改变连接状态的网络</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="33" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>1.线性阵列是一维线性网络，N个结点用N-1个两两连接的链路连成一串</strong>
<ul>
<li>端结点的度为1，其余结点的度为2</li>
<li>网络直径为N-1</li>
<li>等分宽度b=1</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="34" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>2.环形结构：线性阵列首尾相连，有单向环、双向环，是一种对称互连结构</strong>
<ul>
<li>结点的度都是2，等分宽度b=2</li>
<li>双向环：网络直径为N/2</li>
<li>单向环：网络直径为N-1</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="35" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>带弦环：增加的链路愈多，结点度愈高，网络直径就愈小</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="36" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch8p041.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="36" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="36" style="" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="37" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>3.循环移数网络：通过在环上每个结点到所有与其距离为2的整数幂的结点之间都增加一条附加链而构成</strong></li>
<li><strong>一般地，如果｜j-i｜=2ʳ（r=0,1,2,...,n-1，n=log₂N），则结点i与结点j连接</strong>
<ul>
<li>结点度：2n-1</li>
<li>直径：n/2</li>
<li>网络规模N=2ⁿ</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="38" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>4.树形结构：对于有N=2ᵏ-1个结点、k层的完全平衡的二叉树</strong>
<ul>
<li>最大结点度为3，直径为2(k-1)，等分宽度b=1</li>
</ul>
</li>
<li><strong>星形结构：结点度较高，为N-1。直径较小，为常数2，等分宽度b=N/2向下取整</strong></li>
<li><strong>5.胖树结构：整体结构和二叉树结构类似，但是越往上层，相应的链路带宽也越高</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="39" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>6.网格形网络和环网形：对于规模为N=n×n的2维网格形网络</strong>
<ul>
<li>内部结点的度是4</li>
<li>边结点的度是3</li>
<li>角结点的度是2</li>
<li>网络直径D=2(n-1)</li>
<li>等分宽度为n</li>
</ul>
</li>
<li><strong>一个由N=nᵏ个结点构成的k维网格形网络（每维n个结点）的内部结点度d=2k，网络直径D=k(n-1)</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="40" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>Illiac网络：名称来源于采用了这种网络的Illiac IV计算机</strong></li>
<li><strong>与2维网格形网络结构相比，它把每一列的两个端结点分别连接起来，再把所有行的依次首尾相连为一长串</strong></li>
<li><strong>对于规模为n×n的Illiac网络：</strong>
<ul>
<li>所有结点的度都为4</li>
<li>网络直径n-1，只有纯网格形网络直径的一半</li>
<li>等分宽度：2n</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="41" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>环网：把Illiac网络结构每一列的两个端结点连接起来</strong></li>
<li><strong>不同处是，它把每一行的两个端结点分别连接起来，而不是把所有行串在一起</strong></li>
<li><strong>是环形和网格形组合</strong></li>
<li><strong>对于n×n的环网形网：</strong>
<ul>
<li>结点度4</li>
<li>网络直径2×⌊n/2⌋</li>
<li>等分宽度b=2n</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="42" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>7.超立方体：一种二元n立方体结构</strong></li>
<li><strong>一般来说，一个二元n立方体由N=2ⁿ个结点组成，它们分布在n维上，每维有两个结点</strong></li>
<li><strong>为实现一个n立方体，只要把两个(n-1)立方体中相对应的结点用链路连接起来即可，共需要2ⁿ⁻¹条链路</strong></li>
<li><strong>n立方体中结点的度都是n，直径也是n，等分宽度为b=N/2</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="43" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>8.带环立方体（简称3-CCC）：把3-立方体的每个结点换成一个由3个结点构成的环而形成的</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="44" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>8.带环k-立方体（简称k-CCC）：k-立方体的变形，通过用k个结点构成的环取代k-立方体中的每个结点而形成</strong>
<ul>
<li>网络规模为N=k×2ᵏ</li>
<li>网络直径为D=2k-1+⌊k/2⌋</li>
<li>比k-立方体的直径大一倍</li>
<li>等分宽度为b=N/(2k)</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="45" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>9.k元n-立方体：环形、网格、环网形、二元n-立方体（超立方体）和Omega网络都是k元n-立方体网络系列的拓扑同构体</strong></li>
<li><strong>在k元n-立方体网络中，参数n是立方体的维数，k是基数，即每一维上的结点个数</strong></li>
<li><strong>N=kⁿ，（k=ⁿ√N，n=logₖN）</strong></li>
<li><strong>k元n-立方体的结点可以用基数为k的n位地址A=(a₁ a₂ ... aₙ)来表示，其中aᵢ表示该结点在第i维上的位置</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="46" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch8p053.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="46" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="46" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="46" style="" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="47" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>确定性寻径和自适应寻径：</strong>
<ul>
<li><strong>确定性寻径</strong>：通信路径完全由源结点地址和目的地址来决定，与网络的状况无关
<ul>
<li>二维网格网络的X-Y寻径</li>
<li>n维超方体的E-cube寻径</li>
</ul>
</li>
<li><strong>自适应寻径</strong>：通信的通路每一次都要根据资源或者网络的情况来选择
<ul>
<li>具有拥塞控制，可以避开拥挤的或者有故障的结点</li>
<li>例如：TCP/IP网络</li>
</ul>
</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="48" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>二维网格网络的X-Y寻径：先沿X维方向进行寻径，然后再沿Y维方向寻找路径</strong></li>
<li><strong>任意一个源结点：s=(x₁,y₁)，任意一个目的结点：d=(x₂,y₂)</strong></li>
<li><strong>从s出发，先沿X轴方向前进，直到找到d所在的列x₂；然后再沿Y轴方向前进，直到找到目标结点(x₂,y₂)</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="49" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>对于二维网格，确定以下4组&quot;源结点-目的结点&quot;所需要的路径：</strong>
<ul>
<li>(2,1)到(7,6)：需要一条东-北路径</li>
<li>(0,7)到(4,5)：需要一条东-南路径</li>
<li>(6,4)到(2,0)：需要一条西-南路径</li>
<li>(5,3)到(1,5)：需要一条西-北路径</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="50" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>考虑一个由N＝2ⁿ个结点构成的n方体，每个结点的编号是形为b＝bₙ₋₁...b₁b₀的二进制编码</strong></li>
<li><strong>设：源结点s＝sₙ₋₁...s₁s₀，目的结点d＝dₙ₋₁...d₁d₀</strong></li>
<li><strong>现在要确定一条从s到d的步数最少的路径</strong></li>
<li><strong>算法：</strong>
<ol>
<li>计算方向位rᵢ = sᵢ ⊕ dᵢ（i=1,2,...,n）</li>
<li>令v=s, i=1</li>
<li>如果rᵢ=1，则从当前结点v寻径到下一结点v⊕2ⁱ⁻¹；否则跳过</li>
<li>i←i+1，如果i≤n，则转第3步，否则退出</li>
</ol>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="51" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>动态网络：动态互连网络能够在运行时改变网络拓扑，主要分为3种形式：总线网络、交叉开关网络和多级互连网络</strong></li>
<li><strong>总线网络：</strong>
<ul>
<li>由一组导线和插座构成，经常被用来实现计算机系统中处理机模块、存储模块和外围设备等之间的互连</li>
<li>每一次总线只能用于一个源（主部件）到一个或多个目的（从部件）之间的数据传送</li>
<li>特点：结构简单、实现成本低、带宽较窄</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="52" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch8p065.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="52" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="52" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="52" style="" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="53" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>解决总线带宽较窄问题：采用多总线或多层次的总线</strong>
<ul>
<li><strong>多总线</strong>：设置多条总线
<ul>
<li>为不同的功能设置专门的总线</li>
<li>重复设置相同功能的总线</li>
</ul>
</li>
<li><strong>多层次的总线</strong>：按层次的架构设置速度不同的总线，使得不同速度的模块有比较适合的总线连接</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="54" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch8p067.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="54" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="54" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="54" style="" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="55" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>交叉开关网络：单级开关网络</strong></li>
<li><strong>交叉点开关能在对偶（源、目的）之间形成动态连接，同时实现多个对偶之间的无阻塞连接</strong></li>
<li><strong>带宽和互连特性最好</strong></li>
<li><strong>一个n×n的交叉开关网络，可以无阻塞地实现n!种置换</strong></li>
<li><strong>当n很大时，交叉开关网络所需要的硬件数量非常巨大</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="56" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="56" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>C.mmp多处理机的互连结构：16台处理机与16个存储模块互连</strong></li>
<li><strong>最多可同时实现16台处理机对16个不同存储模块的并行访问</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="57" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="57" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>Fujitsu VPP500向量并行处理机的开关网络（224×224）：发PE₀₀₁~PE₂₂₂发送，CP₀₀₁~CP₀₀₂接通/断开接收</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="58" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="58" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>多级互连网络的构成：</strong>
<ul>
<li>MIMD和SIMD计算机都采用多级互连网络MIN（Multistage Interconnection Network）</li>
<li>使用多级开关，使得数据在一次通过网络的过程中可以实现的MIN置换种类更多</li>
<li>由a×b开关模块和级间连接构成</li>
<li>每一级都用了多个a×b开关（a个输入和b个输出，通常a=b=2ᵏ，k≥1）</li>
<li>相邻各级开关之间都有固定的级间连接</li>
</ul>
</li>
<li><strong>通常在N个结点的网络中，多级ICN由n级构成（n=log₂N）</strong></li>
<li><strong>经典的多级互连网有多级立方体网、多级混洗交换网和多级PM2ᵢ网</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="59" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="59" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>最简单的开关模块：2×2开关</strong></li>
<li><strong>二元交换开关的四种基本接通状态：&quot;直连&quot;、&quot;交换&quot;、&quot;上播&quot;和&quot;下播&quot;</strong></li>
<li><strong>在进行数据置换时只能使用前2种</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="60" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="60" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>各种多级互连网络的区别在于所用开关模块、控制方式和级间互连模式的不同</strong></li>
<li><strong>控制方式：</strong>
<ul>
<li><strong>级控制</strong>：每一级所有开关只用一个控制信号控制，只能同时处于同一种状态</li>
<li><strong>单元控制</strong>：每一个开关都有一个独立的控制信号，可各自处于不同的状态</li>
<li><strong>部分级控制</strong>：第i级的所有开关分别用i+1个信号控制（0≤i≤n-1）</li>
</ul>
</li>
<li><strong>常用的级间互连模式：均匀洗牌、蝶式、多路洗牌、纵横交叉、立方体连接等</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="61" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="61" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>多级立方体网络包括STARAN网络和间接二进制n方体网络等</strong></li>
<li><strong>两者仅在控制方式上不同，都采用二功能（直送和交换）的2×2开关</strong></li>
<li><strong>当第i级（0≤i≤n-1）交换开关处于交换状态时，实现的是Cubeᵢ互连函数</strong></li>
<li><strong>一个N输入的多级立方体网络有log₂N级，每级用N/2个2×2开关模块，共需要Nlog₂N/2个开关</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="62" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="62" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>间接二进制n方体网络采用单元控制，具有更大灵活性</strong></li>
<li><strong>STARAN网络采用级控制和部分级控制：</strong>
<ul>
<li>采用级控制时，实现交换功能</li>
<li>采用部分级控制时，实现移数功能</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="63" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="63" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>交换：将有序的一组元素头尾对称地进行交换</strong></li>
<li><strong>对于由8个元素构成的组，各种基本交换的图形：</strong>
<ul>
<li>(a) 4组2元交换</li>
<li>(b) 2组4元交换</li>
<li>(c) 1组8元交换</li>
</ul>

<ul>
<li><strong>3.Omega网络（多级混洗—交换网络）：</strong>
<ul>
<li>有log₂N级，每级N/2个2×2开关模块</li>
<li>每个开关模块均采用单元控制方式</li>
<li>不同开关状态组合可实现各种置换、广播或从输入到输出的其它连接</li>
<li>级间互连采用均匀洗牌连接方式</li>
<li>各级编号是(n-1)...1,0，即按降序排列</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="67" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="67" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>8×8的Omega网络：</strong>
<ul>
<li>单独一级混洗拓扑线路可完成一次数据混洗(σ)</li>
<li>单独一列二元交换开关在处于&quot;交换&quot;状态时可完成一次交换操作(Cube₀)**</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="68" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="68" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>目的：根据给定的输入/输出对应关系，确定各开关的状态</strong></li>
<li><strong>方法：源-目的地址异或法</strong></li>
<li><strong>操作：将任一个输入地址与它要到达的输出地址作异或运算，其结果的bitᵢ控制数据到达的第i级开关，&quot;0&quot;表示&quot;直连&quot;，&quot;1&quot;表示&quot;交换&quot;</strong></li>
<li><strong>例如：给定传输101B→011B，二者异或结果为110B，于是从101B号输入端开始，把第2、1级开关置为&quot;交换&quot;，第0级开关置为&quot;直连&quot;</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="69" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="69" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>N输入互连网络，可能的置换数总共N!个</strong></li>
<li><strong>N输入的Omega网，一次通过可实现N^(N/2)个→阻塞网络</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="70" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="70" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>InfiniBand是IBTA行业协会于2000年10月提出的一种工业级的系统网络通信协议</strong></li>
<li><strong>提供基于交换机的点到点双向串行链路结构，用于处理器节点之间以及处理器节点与输入/输出节点之间的高速互连</strong></li>
<li><strong>通过交换机在节点之间直接创建一个专用的受保护通道，并通过适配器执行远程直接内存访问（RDMA）和发送/接收卸载</strong></li>
<li><strong>InfiniBand采用远程直接内存访问（RDMA）实现通过网络在应用程序之间直接传输数据的能力，无需操作系统参与的零拷贝传输</strong></li>
<li><strong>InfiniBand流量控制是硬件实现的，而TCP是软件实现</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch8p085.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="71" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="71" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>缓存一致性概念：当多个处理器同时存取内存中的共享数据时也会引入一致性问题</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="72" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="72" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>对称式共享存储器系统结构（SMP）为例说明分析缓存（Cache）一致性问题</strong></li>
<li><strong>允许共享数据进入Cache，就可能出现多个处理器的Cache中都有同一存储块的副本</strong></li>
<li><strong>当其中某个处理器对其Cache中的数据进行修改后，就会使得其Cache中的数据与其他Cache中的数据不一致</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="73" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="73" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>缓存一致性：如果对某个数据项的任何读操作均可得到其最新写入的值，则认为这个存储系统是一致的</strong></li>
<li><strong>存储系统行为的两个不同方面：</strong>
<ul>
<li><strong>What</strong>：读操作得到的是什么值</li>
<li><strong>When</strong>：什么时候才能将已写入的值返回给读操作</li>
</ul>
</li>
<li><strong>需要满足以下条件：</strong>
<ul>
<li>处理器P对单元X进行一次写之后又对单元X进行读，读和写之间没有其它处理器对单元X进行写，则P读到的值总是前面写进去的值</li>
<li>处理器P对单元X进行写之后，另一处理器Q对单元X进行读，读和写之间无其它写，则Q读到的值应为P写进去的值</li>
<li>对同一单元的写是串行化的，即任意两个处理器对同一单元的两次写，从各个处理器的角度看顺序都是相同的（写串行化）</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch8p088.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="74" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="74" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>一致性假设：</strong>
<ul>
<li>直到所有的处理器均看到了写的结果，这个写操作才算完成</li>
<li>处理器的任何访存均不能改变写的顺序</li>
</ul>
</li>
<li><strong>在多个处理器中用来维护一致性的协议，关键在于跟踪记录共享数据块的状态</strong></li>
<li><strong>两类协议：</strong>
<ul>
<li>监听式协议（snooping）</li>
<li>目录式协议（directory）</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="75" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="75" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>监听一致性协议（Snooping）：</strong></li>
<li><strong>Cache通常连在共享存储器的总线上，当某个Cache需要访问存储器时，它会把请求放到总线上广播出去</strong></li>
<li><strong>其他各个Cache控制器通过监听总线来判断它们是否有总线上请求的数据块</strong></li>
<li><strong>每个Cache除了包含物理存储器中块的数据拷贝之外，也保存着各个块的共享状态信息</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch8p090.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="76" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="76" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>目录式协议（Directory）：</strong></li>
<li><strong>记录该块的状态</strong></li>
<li><strong>物理存储器中数据块的共享状态被保存在一个称为目录的地方</strong></li>
<li><strong>每个节点添加一个目录，相关存储器的目录信息可能保存在多核心处理器的内部或者外部</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch8p091.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="77" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="77" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>多处理器写更新操作处理：</strong>
<ul>
<li><strong>写作废协议（写失效）</strong>：在处理器对某个数据项进行写入之前，保证它拥有对该数据项的唯一的访问权</li>
<li><strong>写更新协议</strong>：当一个处理器对某数据项进行写入时，通过广播使其它Cache中所有对应于该数据项的副本进行更新</li>
</ul>
</li>
<li><strong>写策略：写直达操作、写回操作</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="78" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="78" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>写失效协议（Write Invalid Protocol）：</strong></li>
<li><strong>在执行写入操作时会使其他副本失效</strong></li>
<li><strong>这是最常用的协议</strong></li>
<li><strong>示例：两个处理器先写、后读某一数据块的情景</strong></li>
<li><strong>由于写操作需要独占访问，其他所有此数据块副本都必须失效</strong></li>
<li><strong>再次读取时，数据已失效的处理器会在缓存中发生缺失，从而强制读取数据块的新副本</strong></li>
<li><strong>这一协议实现了写入串行化</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch8p093.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="79" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="79" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>失效协议中，共享总线或其他广播介质来执行失效操作</strong></li>
<li><strong>在写入一个共享块时，执行写入操作的处理器必须获取总线访问权限来广播其失效</strong></li>
<li><strong>如果两个处理器尝试同时写入共享块，当它们争用总线时，由总线实现这些写入操作的串行化</strong></li>
<li><strong>写回缓存可以为缓存缺失和写入操作使用相同的监听机制</strong></li>
<li><strong>每个处理器都监听放在共享总线上的所有地址</strong></li>
<li><strong>在每个结点内嵌入一个有限状态控制器</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch8p094.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="80" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="80" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>监听缓存（Snoopy Cache）结构：每个块有一个相关联的独立控制器</strong></li>
<li><strong>对不同块的监听操作或缓存请求可以独立进行</strong></li>
<li><strong>实际中，单个控制器允许交错执行以不同块为目标的多个操作</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch8p095.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="81" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="81" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>每个数据块有三种状态：修改（Modified）、共享（Shared）和无效（Invalid），称之为MSI协议</strong></li>
<li><strong>共享状态表明专用缓存中的块可能被共享</strong></li>
<li><strong>已修改状态表明在专用缓存中更新了这个块</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="82" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="82" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>MSI协议状态转换：</strong>
<ul>
<li><strong>读取命中</strong>：正常命中，处理器在共享或已修改状态下读取本地缓存中的数据</li>
<li><strong>读取缺失</strong>：在无效状态下产生读取缺失，将读取缺失放在总线上</li>
<li><strong>地址冲突缺失</strong>：在共享或已修改状态下产生地址冲突缺失，已修改状态需要写回块</li>
<li><strong>写命中</strong>：在已修改状态下正常命中，在共享状态下产生一致性操作（失效）</li>
<li><strong>写缺失</strong>：在无效或共享状态下产生写缺失</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch8p098.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="83" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="83" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>每个高速缓存行都有状态标志位：</strong>
<ul>
<li><strong>M（Modified）</strong>：已修改</li>
<li><strong>S（Shared）</strong>：共享</li>
<li><strong>I（Invalid）</strong>：无效</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="84" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="84" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>MSI基本协议的扩展：</strong>
<ul>
<li><strong>MESI协议</strong>：在基本MSI协议中添加了&quot;独占&quot;(Exclusive)状态，用于表示缓存块仅在一个缓存中且是干净的</li>
<li><strong>MOESI协议</strong>：在MESI协议基础之上添加了&quot;拥有&quot;(Owned)状态，表示相关块由该缓存拥有，在存储器中已经过时</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch8p101.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="85" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="85" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>监听一致性协议的开销和挑战：</strong>
<ul>
<li><strong>性能开销</strong>：节点之间需要通信、交换消息和协商，增加网络延迟和计算负载</li>
<li><strong>节点故障</strong>：协议可能需要额外的机制来处理节点的故障</li>
<li><strong>异步通信</strong>：无法保证在有限时间内达到一致性</li>
<li><strong>扩展性</strong>：在大规模系统中的扩展性是一个挑战</li>
<li><strong>安全性</strong>：对拜占庭容错具有限制</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch8p102.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="86" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="86" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>Cache缺失归因于三种因素：容量(Capacity)、强制(Compulsory)和冲突(Conflict)</strong></li>
<li><strong>多处理器之间的通信也会导致缺失，被称为一致性缺失，分为两种情况：</strong>
<ul>
<li><strong>真共享缺失</strong>：源自通过缓存一致性机制进行的数据通信</li>
<li><strong>假共享缺失</strong>：因为使用了基于失效的一致性算法，这种算法利用了数据块的有效位</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="87" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="87" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>集中式数据结构的瓶颈问题：近年，多核处理器的发展迫使设计转向某种分布式存储器，以支持各个处理器的带宽要求</strong></li>
<li><strong>通过分布式存储器来提高存储器带宽和互连带宽，本地存储器通信与远程存储器通信隔离开来，将降低了对存储器系统和互连网络的带宽要求</strong></li>
<li><strong>监听式一致性协议的替代方法是目录式协议</strong></li>
<li><strong>目录中保存了每个可缓存块的状态，包括哪些缓存（或缓存集合）拥有这个块的副本，它是否需要更新等</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch8p104.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="88" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="88" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>目录式协议的三种状态：</strong>
<ul>
<li><strong>共享</strong>：一个或多个节点缓存这个块，存储器的值是最新的</li>
<li><strong>未缓存</strong>：所有节点都没有这个缓存块的副本</li>
<li><strong>已修改</strong>：只有一个节点有这个缓存块的副本，它已经对这个块进行了写操作，所以存储副本已经过期。这个处理器被称为这个块的拥有者</li>
</ul>
</li>
<li><strong>目录式协议也必须实现两种主要操作：处理读取缺失和处理写共享块</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch8p105.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="89" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="89" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>多个进程或者线程需要并发执行时，需要考虑它们之间如何同步</strong></li>
<li><strong>同步机制通常是以软件例程实现的，这些例程依赖于硬件提供的同步指令</strong></li>
<li><strong>对于较小型的多处理器或低竞争解决方案，关键硬件功能是拥有不可中断的指令或指令序列，它们能以原子方式获取和修改一个值</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="90" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="90" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>在多处理器中实施同步时所需要的关键功能就是一组能够以原子方式读取和修改存储器的硬件原语</strong></li>
<li><strong>硬件原语：</strong>
<ul>
<li>（1）原子交换（atomic exchange）</li>
<li>（2）测试并置定（test and set）</li>
<li>（3）读取并加1（fetch and increment）</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="91" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="91" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>一般利用一对指令构造同步原语，通过第二条指令返回值判断这一对指令是否以原子形式执行</strong></li>
<li><strong>在RISC-V中，这种指令对包含：</strong>
<ul>
<li><strong>LR（load reserved或load linked）</strong>：链接载入指令</li>
<li><strong>SC（store conditional）</strong>：条件存储指令</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="92" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="92" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>在拥有原子操作之后，就可以使用多处理器的一致性机制来实施自旋锁（spinlock）</strong></li>
<li><strong>处理器持续用循环来尝试获取锁，直到成功为止</strong></li>
<li><strong>多处理器支持缓存一致性，就可以使用一致性机制将锁放在缓存中，保持锁值的一致性</strong></li>
<li><strong>将锁放在缓存中有两个好处：</strong>
<ul>
<li>第一，仅通过循环针对本地缓存副本完成&quot;自旋&quot;过程，不需要在每次尝试获取锁时都请求全局存储器访问</li>
<li>第二个好处是利用了锁访问存在的局域性</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch8p110.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="93" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="93" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>使用LR/SC原语实现旋转锁操作</strong></li>
<li><strong>第一个分支形成环绕的循环体，第二个分支解决了两个处理器同时看到锁可用的情况下的争用问题</strong></li>
<li><strong>改进旋转锁的整体思路是：首先只对本地Cache中锁的副本进行读取和检测，直到发现该锁已经被释放</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="94" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="94" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>旋转锁的主要优点是当重复访问未变锁值时，总是cache读命中，从而减少其内存访问</strong></li>
<li><strong>在大规模多处理机中，若所有的处理器都同时争用同一个锁，则会导致大量锁争用和通信开销</strong></li>
<li><strong>当竞争不激烈且同步操作较少时，主要关心的是一个同步原语操作的延迟</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="95" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="95" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>当多个处理器通过共享变量进行通信时，缓存视图一致性（coherence）保证了多个处理器读到存储器内容是一致的</strong></li>
<li><strong>不同处理器上程序读写多个共享变量次序和内存看到的读写次序可能不一样</strong></li>
<li><strong>其原因在于现代处理器为了优化写性能，会使用写缓存</strong></li>
<li><strong>如果一个或多个处理器发出的读写次序到达存储器的次序是否相同，则称为存储顺序一致性（consistency）问题</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="96" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="96" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>存储顺序一致性的最简单模型称为顺序一致性模型（sequential consistency）</strong></li>
<li><strong>顺序一致性要求在不同处理器之间的访问任意交错时，但是存取内存的顺序都是一样的，就像每个处理器是按顺序执行存储器访问操作</strong></li>
<li><strong>实现顺序一致性模型的最简单方法是要求处理器立刻执行所有存储器访问，直到该访问操作所导致的其他处理器缓存全部失效均告完成为止</strong></li>
<li><strong>顺序一致性模型给出了一种简单的编程范例，但它可能会大幅度降低性能，特别是当多处理器数目很多或者互连延迟很长时</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch8p114.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="97" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="97" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>从程序员的角度来看，顺序一致性模型是直观和简单，但有性能方面的不足</strong></li>
<li><strong>一种更高效的编程模型是程序员通过显示地同步操作控制对共享数据的访问次序</strong></li>
<li><strong>无论什么情况，一个处理器对某一变量的写入操作与另一个处理器对这个变量的访问（或者为读取，或者为写入）之间由一对同步操作隔离开来</strong></li>
<li><strong>如果变量可以在未由同步操作进行排序的情况下更新，就会产生数据竞赛（data races）</strong></li>
<li><strong>几乎所有的程序员都选择使用标准同步库</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch8p115.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="98" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="98" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>宽松一致性模型的关键思想是允许乱序执行读取和写入操作，但使用同步操作来实施排序</strong></li>
<li><strong>形式化定义一组规则来描述顺序，其形式为X→Y，也就是说必须在完成操作X之后才能执行操作Y</strong></li>
<li><strong>放松W→R顺序：得到完全存储排序或处理器一致性模型（Total Store Order，TSO）</strong></li>
<li><strong>放松W→R和W→W顺序：得到部分存储顺序的模型</strong></li>
<li><strong>放松四种顺序：得到弱排序、PowerPC一致性模型、释放一致性、RISC-V一致性模型</strong></li>
<li><strong>更强的一致性模型能够简化编程，但需要更多的硬件确保执行次序</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch8p116.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="99" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch8p117.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="99" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="99" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="99" style="" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="100" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="100" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>多级缓存提供包含性（multilevel inclusion），也就是缓存层次结构中上一级都是下一级的子集</strong></li>
<li><strong>当L1和L2的块大小不同时，一般L2的通常要大得多，而L2中的一个块对应于L1中的多个块</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="101" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="101" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9">
<ul>
<li><strong>附录H进一步介绍了多处理器相关的扩展内容</strong></li>
<li><strong>在8.3节的基础之上讲解了监听协议的局域性、对称共享存储器多处理器的性能和面向分布式共享存储器的目录式一致性协议</strong></li>
<li><strong>在8.5节的基础之上讲解了宽松一致性模型和包含性及实现</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="102" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch8p120.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="102" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="102" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="103" data-size="16:9" data-marpit-advanced-background="content"></section>
