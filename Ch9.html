<h1 id="%E8%AE%A1%E7%AE%97%E6%9C%BA%E9%9B%86%E7%BE%A4%E5%92%8C%E6%95%B0%E6%8D%AE%E4%B8%AD%E5%BF%83">计算机集群和数据中心</h1>
<p><strong>计算机系统结构</strong><br />
</p>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-class="lead" data-theme="gaia" lang="C" class="lead" data-marpit-pagination="1" style="" data-marpit-pagination-total="53" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="2" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9">
<h2 id="%E6%9C%AC%E7%AB%A0%E5%86%85%E5%AE%B9">本章内容</h2>
<ul>
<li><strong>掌握数据中心的基本特性</strong></li>
<li><strong>理解数据中心的工作负载</strong></li>
<li><strong>掌握数据中心的计算机体系结构</strong></li>
<li><strong>理解数据中心的效率与成本</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="3" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>数据中心是许多人每日所用互联网服务的基础，这些服务包括：搜索、社交网络、在线地图、视频共享、网上购物、电子邮件服务等</strong>
<ul>
<li>谷歌称其为Warehouse-Scale Computer，WSC</li>
</ul>
</li>
<li><strong>在互联网服务庞大市场的驱动下，数据中心得到了快速发展</strong></li>
<li><strong>传统的巨型计算机系统如超算，尽管数据中心看起来和其颇为相似，但体系结构和工作任务有很大的不同</strong></li>
<li><strong>如今的数据中心成本大约为1亿5千万美元，包括机房、配电与制冷基础设施、服务器和联网设备，连接和容纳50000～100000台服务器</strong></li>
<li><strong>此外，云计算的快速发展让每一个拥有在线支付账户的人都能使用数据中心</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch9p003.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="4" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>数据中心的早期形态，是被称作计算机集群（Cluster）的系统，最早出现于20世纪60年代，用以运行单机难以装载的大型计算任务，抑或需要在处理过程中以冗余备份机应对处理机的意外失效</strong>
<ul>
<li>Tandem公司在1975年推出了一个包含16个节点的集群系统</li>
<li>Digital公司在1984年推出了VAX集群系统</li>
</ul>
</li>
<li><strong>此类系统最初采取的是一种由独立处理机共享I/O设备的设计，通过一种分布式操作系统来进行协调</strong></li>
<li><strong>随后，又给处理机提供了互连网络，以支持处理机在空间上的分布，实现容灾、提高可用性</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch9p004.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="5" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>在科学计算领域，集群系统已成为并行多处理机（Multiple Parallel Processors，MPP）的主要竞争对手</strong></li>
<li><strong>1994年，贝奥武夫（Beowulf）项目启动</strong>
<ul>
<li>旨在实现美国国家航空航天局的低成本1 GFLOPS算力计算机目标（成本在5万美元以内）</li>
</ul>
</li>
<li><strong>1994年，基于16台80486个人计算机成功实现了这样一套集群系统</strong>
<ul>
<li>其关键在于实现一套软件生态，为任务提交、协同工作以及调试大型或大批程序提供支持</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch9p005.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="6" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>随后，有不少研究工作聚焦于减少集群处理机之间的通信延迟，提高传输带宽</strong>
<ul>
<li>其中有一项成功的商业化成果，即虚拟接口（Virtual Interface，VI）接口标准，为集群处理机之间提供了低延迟的通信机制，在随后的工作中由Infiniband发展壮大</li>
</ul>
</li>
<li><strong>低延迟通信技术随即在形形色色的应用中表现出了价值，例如</strong>
<ul>
<li>1997年由加州大学伯克利分校基于100台UltraSPARC台式机组建的集群系统，使用由Myrinet提供的单链路160MB/s交换机连接</li>
<li>创造了数据库排序的世界纪录，也就是在1min之内完成存放于磁盘内8.6GB数据的排序，以及仅用3.5h破解由40-bit DES密钥加密的信息</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch9p006.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="7" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>1995年，搜索引擎Inktomi背后的同名初创公司启动了一个名为工作站网络NOW的项目</strong>
<ul>
<li>标准化网络和常规机架式服务器让Inktomi构建的集群具备了优秀的可扩展性</li>
<li>与之形成鲜明对比的是，彼时领先的搜索引擎Alta Vista则是基于大规模对称多处理器系统实现</li>
<li>和传统高性能计算架构相比，集群系统借助于相对更大规模的低成本节点和简洁的编程模型，走向了一条更经济的发展路线</li>
</ul>
</li>
<li><strong>在随后的发展历程中，NOW项目和Inktomi一般就被当做数据中心和云计算的奠基工作，谷歌将这条技术路线发展壮大，成为了最成功的搜索引擎</strong>
<ul>
<li>这套系统也被谷歌称作WSC的数据中心架构，在其著名的搜索结果排序算法PageRank之后被作为最关键的创新公之于众</li>
<li>经历多年考验至今，几乎所有互联网服务都基于集群技术来构建系统，以服务数以百万计的海量客户</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch9p007.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="8" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch9p008.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="8" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="8" style="" data-marpit-pagination-total="53" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="9" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>当前数据中心的规模已经达到相当的水平，以至于不能继续依赖传统的供电、冷却和监控管理方法，需要在这些方面做出创新</strong></li>
<li><strong>数据中心也常常被认为是超级计算机的现代衍生物——后者使西摩·克雷（Seymour Cray）成为当今数据中心架构师的先驱</strong>
<ul>
<li>高端计算机可以完成几乎在其它所有机器上都无法运行的计算任务，但又十分昂贵，只有很少几家客户可以承受得起</li>
<li>而现在的目标是为普罗大众提供信息技术，而不再是仅为科学家和工程师们提供高性能计算</li>
<li>因此，相对于超级计算机在过去发挥的作用，数据中心在当今社会中具有更为普遍的意义</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch9p009.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="10" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>数据中心架构师有许多目标和需求与高性能服务器架构师是一致的</strong>
<ul>
<li><strong>成本与性能</strong>：单位资金能够完成的工作量至关重要，数据中心的规模太大了</li>
<li><strong>能耗效率</strong>：配电成本与功率消耗具有函数关系，需要有充足的配电供给才能按照额定功率运转</li>
<li><strong>通过冗余提高可靠性</strong>：互联网服务的性质要求其必须长时间运行，这就意味着数据中心中的硬件和软件在整体上至少提供99.99%的可用性，即，每年的宕机时间必须小于1h</li>
<li><strong>网络I/O</strong>：服务器架构师必须提供一个有性能保证的外部网络，数据中心架构师也必须如此</li>
<li><strong>交互式与批处理工作负载</strong>：对于诸如搜索和社交网络等拥有海量用户的服务，人们期望其工作负载具有很强的交互性</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch9p010.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="11" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>数据中心架构师有许多目标和需求与高性能服务器架构师是一致的</strong>
<ul>
<li><strong>充足的并行</strong>：服务器架构师的一个顾虑是目标应用是否有足够的并行度，以充分发挥大量并行硬件的功用，为实现这一并行，需要通信硬件提供足够的资源和性能，其成本是否过高？数据中心架构师则不关注应用内部的并行度，用户之间足以充分并行</li>
<li><strong>运行成本计算</strong>：服务器架构师通常是在成本预算内使设计的系统实现峰值性能，对于功率的主要顾虑是确保其不会超出机柜的冷却能力；对于服务器的运行成本，相对于购买成本来说，一般不那么显著，因此一般会被忽略；数据中心的寿命明显要长于服务器，机房、配电和制冷基础设施通常要使用10年以上，所以运营成本也不可小视</li>
<li><strong>规模、与规模相关的机会/问题</strong>：通常，高端计算机都异常昂贵，因其常常需要定制硬件，但又因为高端计算机的制造数量很少，所以就无法有效地分摊定制成本；如果是购买50000台常规服务器和相关基础设施，用来建造一个数据中心，那就完全不同</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch9p011.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="12" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>数据中心与传统服务器机房相比又怎么样呢？</strong>
<ul>
<li>传统服务器机房的运营商通常会从其所服务组织的多个部门收集机器和第三方软件，并集中运行和管理
<ul>
<li>通常关注将许多信息服务整合到相对较少的机器中以节约成本提高效率，即服务器整合（Server Consolidation），这些机器往往还要相互隔离，以保护敏感信息</li>
<li>因此，虚拟机的重要性日益增加</li>
</ul>
</li>
<li>与数据中心不同的是：传统服务器机房往往拥有各种原本分属不同客户的各型硬件和软件，为一家组织中的各种客户分别提供服务；数据中心程序员则自行定制第三方软件或者专门开发软件，数据中心往往拥有更为同质化的硬件，数据中心的目标是让整个系统中的硬件、软件看起来就像是只有一台计算机，只是上面运行着各种不同的应用程序</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch9p012.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="13" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>亚马逊分布在全球的数据中心</strong></li>
</ul>
<p>In 2017 AWS had 16 sites (&quot;regions&quot;), with two more opening soon. Most sites have two to three availability zones, which are located nearby but are unlikely to be affected by the same natural disaster or power outage, if one were to occur. (The number of availability zones are listed inside each circle on the map.) These 16 sites or regions collectively have 42 availability zones. Each availability zone has one or more WSCs.</p>
<p><a href="https://aws.amazon.com/about-aws/global-infrastructure/">https://aws.amazon.com/about-aws/global-infrastructure/</a></p>
</div>
<div>
<p><img src="images/Ch9p013.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="14" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>谷歌分布在全球的数据中心</strong></li>
</ul>
<p>In 2017 Google had 15 sites. In the Americas: Berkeley County, South Carolina; Council Bluffs, Iowa; Douglas County, Georgia; Jackson County, Alabama; Lenoir, North Carolina; Mayes County, Oklahoma; Montgomery County, Tennessee; Quilicura, Chile; and The Dalles, Oregon. In Asia: Changhua County, Taiwan; Singapore. In Europe: Dublin, Ireland; Eemshaven, Netherlands; Hamina, Finland; St. Ghislain, Belgium.</p>
<p><a href="https://www.google.com/about/datacenters/inside/locations/">https://www.google.com/about/datacenters/inside/locations/</a></p>
</div>
<div>
<p><img src="images/Ch9p014.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="15" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>微软分布在全球的数据中心</strong></li>
</ul>
<p>In 2017 Microsoft had 34 sites, with four more opening soon.</p>
<p><a href="https://azure.microsoft.com/en-us/regions/">https://azure.microsoft.com/en-us/regions/</a></p>
</div>
<div>
<p><img src="images/Ch9p015.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="16" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch9p016.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="16" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9" data-marpit-advanced-background="content"></section>

<div>
<ul>
<li><strong>数据中心中最流行的批处理框架是MapReduce及开源框架Hadoop</strong>
<ul>
<li>表中显示了谷歌公司MapReduce的年度使用数据</li>
<li>受同名Lisp函数的启发，Map首先将程序员提供的函数应用于每条逻辑输入记录。Map在数千台计算机上运行，生成由键/值对组成的中间结果</li>
<li>Reduce收集这些分布式任务的输出，并使用另一个由程序员定义的函数来分解它们</li>
<li>通过适当的软件支持，这两者都是高度并行的，而且其理解和使用都很容易</li>
<li>在30分钟之内，不需要如超算那样进行严谨的培训，新手就可以在数千台计算机上运行MapReduce任务</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch9p019.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="20" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>例如，用一个MapReduce程序计算一大组文档中每个英文单词的出现次数。下面是这个程序的简化版本，仅给出了内层循环，并假定所有英文单词仅在文档中出现一次</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-built_in">map</span>(String key, String value):
  // key: document name
  // value: document contents
  <span class="hljs-keyword">for</span> each word w <span class="hljs-keyword">in</span> value
    EmitIntermediate(w,<span class="hljs-string">&quot;1&quot;</span>); // Produce <span class="hljs-built_in">list</span> of <span class="hljs-built_in">all</span> words

reduce(String key, Iterator values):
  // key: a word
  // value: a <span class="hljs-built_in">list</span> of counts
  <span class="hljs-built_in">int</span> result = <span class="hljs-number">0</span>;
  <span class="hljs-keyword">for</span> each v <span class="hljs-keyword">in</span> values
    result += ParseInt(v); // get integer <span class="hljs-keyword">from</span> key-value pair
  Emit(AsString(result));
</code></pre>
</div>
<div>
<p><img src="images/Ch9p020.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="21" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>为了适应数千台计算机的性能变化，MapReduce调度程序根据各个节点完成先前任务的速度来分配新的任务</strong>
<ul>
<li>显然，哪怕只有一个速度缓慢的任务，也可能会阻挡大型MapReduce作业的完成</li>
</ul>
</li>
<li><strong>在数据中心中，对缓慢任务的解决方法是提供一种软件机制，以应对如此规模的性能变化</strong>
<ul>
<li>这种方法与传统集群系统采取的解决方案截然不同，在集群系统中，任务缓慢通常意味着硬件损坏，需要替换，或者服务器软件需要调优或重写</li>
<li>对于数据中心中的数万台服务器来说，性能出现差异是正常现象</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch9p021.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="22" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>公共交互式服务的工作负载需求都会有大幅波动</strong>
<ul>
<li>即使是谷歌搜索这样流行的全球性服务，在一天中的不同时间也可能会有两倍的变化幅度</li>
</ul>
</li>
<li><strong>如果针对某些应用程序考虑周末、假日和一年中高峰时间等因素，将会看到提供互联网服务的服务器在利用率方面都波动较大</strong>
<ul>
<li>如春节假期的红包服务，或者&quot;双十一&quot;的网上购物活动</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch9p022.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="23" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>图中给出了5000台谷歌服务器在6个月内的平均CPU利用率</strong>
<ul>
<li>不难发现，服务器很少是完全空闲或全负荷工作的，不到0.5%的服务器平均利用率达到100%，在大多数时间里，服务器的利用率介于10%～50%之间</li>
<li>换句话说，利用率超过50%的服务器仅占全部服务器的10%</li>
<li>对于数据中心的服务器来说，在工作负载很低时的良好表现要远比峰值负载时的高效运行重要得多，因为它们很少会在峰值状态下运行</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch9p023.png" alt="" style="width:520px;" /></p>

</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="26" style="" data-marpit-pagination-total="53" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="27" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>数据中心网络是将大量服务器连接在一起的中枢</strong>
<ul>
<li>类似于第5章的存储器层次结构，数据中心使用一种层次网络结构</li>
<li>其结构来自于巴罗索（Barroso）和霍尔兹勒（Hölzle）的论文：A Google rack for its WSC. Its dimensions are about 7 ft high, 4 ft wide, and 2 ft deep (2 m × 1.2 m × 0.5 m). The Top of Rack switches are indeed at the top of this rack. Next comes the power converter that converts from 240 V AC to 48 V DC for the servers in the rack using a bus bar at the back of the rack. Next is the 20 slots (depending on the height of the server) that can be configured for the various types of servers that can be placed in the rack. Up to four servers can be placed per tray. At the bottom of the rack are high-efficiency distributed modular DC uninterruptible power supply (UPS) batteries.</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch9p026.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="28" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>一种很自然的设计是用服务器填充一个机架，扣除大众化以太网机架交换机所需要的空间</strong></li>
<li><strong>这种设计带来一个问题：把存储放在哪儿？</strong>
<ul>
<li>从硬件构建的角度来看，最简单的解决方案是将磁盘包含在服务器中，通过以太网连接访问远程服务器磁盘上的信息</li>
<li>另一种替代方案是使用NAS，可以是通过类似于InfiniBand的存储网络来连接集中部署的磁盘。NAS解决方案的每TB存储容量成本通常要更高一些，但它提供了许多功能，包括用于提高存储器可靠性的RAID技术</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch9p027.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="29" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>根据上一节表达的思想，可以预计：</strong>
<ul>
<li>数据中心通常会依靠本地磁盘，并提供用于处理连接性和可靠性的存储软件</li>
<li>例如，谷歌文件系统（GFS）使用本地磁盘，至少维护3个副本，以克服可靠性问题
<ul>
<li>这一冗余不仅可以应对本地磁盘故障，还能应对机架和整个集群的电源故障</li>
<li>最终一致性设计给GFS提供的灵活性降低了使这些副本保持一致所需的成本，还降低了存储系统的网络带宽需求</li>
</ul>
</li>
<li>稍后将会看到，本地访问模式还意味着连向本地存储的高带宽</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch9p028.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="30" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>以谷歌数据中心为例给出了数据中心内部的存储系统层次结构</strong></li>
</ul>
<p>服务器（单台）→机架交换机→机架（40台服务器）→……→数据中心骨干网→机群（125台机架）→阵列交换机</p>

<div>

</div>

<div>
<ul>
<li><strong>每台服务器</strong>包含16 GB内存，访问时间为100 ns，传输速度为20 GB/s，还有一个2 TB磁盘，访问时间为10 ms，传输速度为200 MB/s。每块主板上有两个插槽，它们共享一个1 Gbit/s以太网端口</li>
<li><strong>每对机架</strong>包括一台机架交换机，容纳80个2U服务器。联网软件再加上交换机开销将DRAM的延迟增加至100 ms，磁盘访问延迟增加到11 ms。因此，一个机架的总存储容量大约为1 TB的DRAM和160 TB的磁盘存储。1 Gbit/s以太网将连向该机架内的DRAM或磁盘的远程带宽限制为100 MB/s</li>
<li><strong>阵列交换机</strong>可以承载30个机架，所以一个阵列的存储容量可增加30倍：DRAM为30 TB，磁盘为4.8 PB。阵列交换机硬件和软件将连向阵列内DRAM的延迟增加到300 ms，磁盘延迟增加到12 ms。数据交换机的带宽将连向阵列DRAM或阵列磁盘的远程带宽限制为10 MB/s</li>
</ul>
</div>
<div>
<p><img src="images/Ch9p031.png" alt="" style="width:520px;" /></p>
</div>
</div>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="33" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>需要20台阵列交换机连接到50000台服务器，所以联网层次又多一级</strong></li>
</ul>

</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="34" style="" data-marpit-pagination-total="53" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="35" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch9p034.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="35" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="35" style="" data-marpit-pagination-total="53" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="36" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>要构建数据中心，首先需要建造一个仓库</strong></li>
<li><strong>第一个问题就是：在哪里建造？</strong>
<ul>
<li>房地产代理强调位置，但对数据中心来说，位置意味着接近互联网骨干光纤、电力成本低、环境灾难风险低（比如地震、洪水和飓风）</li>
</ul>
</li>
<li><strong>对于一个拥有许多数据中心的公司来说，还需要找到一个在地理上接近当前或未来互联网用户群的地方，以降低通过互联网的延迟</strong>
<ul>
<li>还有其它许多现实考虑因素，比如不动产税率</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch9p035.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="37" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>配电与制冷的基础设施成本会让数据中心的构建成本相形见绌</strong></li>
<li><strong>图中给出了数据中心内的配电基础设施</strong>
<ul>
<li>尽管有许多不同的部署方式，但从电力塔高压线开始，电力通常经过大约5个步骤、4级电压变换到达服务器</li>
<li>各环节效率：99.7%、98%、98%、94%、99%</li>
<li>传统数据中心供电损耗约11%</li>
<li><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mn>0.997</mn><mo>×</mo><mn>0.98</mn><mo>×</mo><mn>0.98</mn><mo>×</mo><mn>0.94</mn><mo>×</mo><mn>0.99</mn><mo>≈</mo><mn>89</mn><mi mathvariant="normal">%</mi></mrow><annotation encoding="application/x-tex">0.997 × 0.98 × 0.98 × 0.94 × 0.99 ≈ 89\%</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.7278em;vertical-align:-0.0833em;"></span><span class="mord">0.997</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">×</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.7278em;vertical-align:-0.0833em;"></span><span class="mord">0.98</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">×</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.7278em;vertical-align:-0.0833em;"></span><span class="mord">0.98</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">×</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.7278em;vertical-align:-0.0833em;"></span><span class="mord">0.94</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">×</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.6444em;"></span><span class="mord">0.99</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">≈</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.8056em;vertical-align:-0.0556em;"></span><span class="mord">89%</span></span></span></span></li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch9p036.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="38" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>配电与制冷的基础设施成本会让数据中心的构建成本相形见绌</strong></li>
<li><strong>图中给出了数据中心内的制冷基础设施</strong>
<ul>
<li>在典型数据中心中，制冷系统与IT设备的相对功率成本如下：
<ul>
<li>冷减器占IT设备功率的30%～50%</li>
<li>CRAC占IT设备功率的10%～20%，大多消耗在风扇上</li>
</ul>
</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch9p037.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="39" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>巴罗索等人对数据中心设备自身内部的功率利用进行了分解，据此给出了在2012年部署的谷歌数据中心的数据，具体如下：</strong>
<ul>
<li>42%的功率用于处理器</li>
<li>12%用于DRAM</li>
<li>14%用于磁盘</li>
<li>5%用于联网</li>
<li>15%用于制冷开销</li>
<li>8%用于供电开销</li>
<li>4%用于其他方面</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch9p038.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="40" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>一种广泛使用的简单度量可以用来评估一个数据中心的效率，称为功率利用效率（Power Utilization Effectiveness，PUE）</strong></li>
</ul>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><mi>P</mi><mi>U</mi><mi>E</mi><mo>=</mo><mfrac><mtext>总设施功率</mtext><mrow><mi>I</mi><mi>T</mi><mtext>设备功率</mtext></mrow></mfrac></mrow><annotation encoding="application/x-tex">PUE = \frac{总设施功率}{IT设备功率}
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord mathnormal" style="margin-right:0.13889em;">P</span><span class="mord mathnormal" style="margin-right:0.10903em;">U</span><span class="mord mathnormal" style="margin-right:0.05764em;">E</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:2.0463em;vertical-align:-0.686em;"></span><span class="mord"><span class="mopen nulldelimiter"></span><span class="mfrac"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:1.3603em;"><span style="top:-2.314em;"><span class="pstrut" style="height:3em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.07847em;">I</span><span class="mord mathnormal" style="margin-right:0.13889em;">T</span><span class="mord cjk_fallback">设备功率</span></span></span><span style="top:-3.23em;"><span class="pstrut" style="height:3em;"></span><span class="frac-line" style="border-bottom-width:0.04em;"></span></span><span style="top:-3.677em;"><span class="pstrut" style="height:3em;"></span><span class="mord"><span class="mord cjk_fallback">总设施功率</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.686em;"><span></span></span></span></span></span><span class="mclose nulldelimiter"></span></span></span></span></span></span></p><ul>
<li><strong>很明显，PUE总是大于或等于1，PUE越大，数据中心的效率就越低</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch9p039.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="41" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>PUE随数据中心投产时间的变化趋势</strong></li>
</ul>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><mi>P</mi><mi>U</mi><mi>E</mi><mo>=</mo><mfrac><mtext>总设施功率</mtext><mrow><mi>I</mi><mi>T</mi><mtext>设备功率</mtext></mrow></mfrac></mrow><annotation encoding="application/x-tex">PUE = \frac{总设施功率}{IT设备功率}
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord mathnormal" style="margin-right:0.13889em;">P</span><span class="mord mathnormal" style="margin-right:0.10903em;">U</span><span class="mord mathnormal" style="margin-right:0.05764em;">E</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:2.0463em;vertical-align:-0.686em;"></span><span class="mord"><span class="mopen nulldelimiter"></span><span class="mfrac"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:1.3603em;"><span style="top:-2.314em;"><span class="pstrut" style="height:3em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.07847em;">I</span><span class="mord mathnormal" style="margin-right:0.13889em;">T</span><span class="mord cjk_fallback">设备功率</span></span></span><span style="top:-3.23em;"><span class="pstrut" style="height:3em;"></span><span class="frac-line" style="border-bottom-width:0.04em;"></span></span><span style="top:-3.677em;"><span class="pstrut" style="height:3em;"></span><span class="mord"><span class="mord cjk_fallback">总设施功率</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.686em;"><span></span></span></span></span></span><span class="mclose nulldelimiter"></span></span></span></span></span></span></p><p>图中展示了1995年至2030年数据中心的实际PUE（Real World PUE）变化趋势，以及理论运行PUE。</p>
</div>
<div>
<p><img src="images/Ch9p040.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="42" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>数据中心的设计者需要同时关注数据中心的运行成本和构建成本</strong>
<ul>
<li>前者是运营成本（Operational expenditures，OPEX）</li>
<li>后者是资本支出（Capital expenditures，CAPEX）</li>
</ul>
</li>
<li><strong>为了正确合理地看待能源成本，汉密尔顿（Hamilton）等人研究了数据中心的成本，确定8MW设施的CAPEX为8800万美元，大约46000台服务器和相应的网络设备，向数据中心的CAPEX另外增加了7900万美元</strong>
<ul>
<li>考虑数据中心上部署的应用一般有着不同的网络流量和服务质量需求，因特网带宽成本将随应用程序变化，所以这里未包含在内。设施CAPEX的其余18%包括购买知识产权和机房的建设成本</li>
</ul>
</li>
</ul>
</div>

<div>
<ul>
<li><strong>表中对这一案例研究的月度OPEX进行了分解</strong>
<ul>
<li>不同设备的分摊率有很大不同，设施的分摊期限为10年，网络设备为4年，服务器为3年</li>
<li>数据中心设施以10年为单位持续运行，但需要每3年将服务器更换一次，每4年将网络设备更换一次</li>
<li>通过分摊CAPEX，汉密尔顿（Hamilton）计算出月度OPEX，包括贷款支付数据中心款项的利率（每年5%）。月度OPEX为380万美元，大约为CAPEX的2%</li>
</ul>
</li>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="44" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>在一个数据中心中，每年每瓦的全额成本为：</strong></li>
</ul>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><mfrac><mrow><mtext>基础设施的月度成本</mtext><mo>+</mo><mtext>电力的月度成本</mtext></mrow><mtext>设施规模</mtext></mfrac><mo>×</mo><mn>12</mn><mo>=</mo><mfrac><mrow><mn>76.5</mn><mtext>万</mtext><mo>+</mo><mn>47.5</mn><mtext>万</mtext></mrow><mrow><mn>800</mn><mtext>万</mtext></mrow></mfrac><mo>×</mo><mn>12</mn><mo>=</mo><mn>1.86</mn><mtext>美元</mtext><mi mathvariant="normal">/</mi><mtext>瓦</mtext><mo separator="true">⋅</mo><mtext>年</mtext></mrow><annotation encoding="application/x-tex">\frac{基础设施的月度成本 + 电力的月度成本}{设施规模} \times 12 = \frac{76.5万 + 47.5万}{800万} \times 12 = 1.86 美元/瓦·年
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:2.0463em;vertical-align:-0.686em;"></span><span class="mord"><span class="mopen nulldelimiter"></span><span class="mfrac"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:1.3603em;"><span style="top:-2.314em;"><span class="pstrut" style="height:3em;"></span><span class="mord"><span class="mord cjk_fallback">设施规模</span></span></span><span style="top:-3.23em;"><span class="pstrut" style="height:3em;"></span><span class="frac-line" style="border-bottom-width:0.04em;"></span></span><span style="top:-3.677em;"><span class="pstrut" style="height:3em;"></span><span class="mord"><span class="mord cjk_fallback">基础设施的月度成本</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">+</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mord cjk_fallback">电力的月度成本</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.686em;"><span></span></span></span></span></span><span class="mclose nulldelimiter"></span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">×</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.6444em;"></span><span class="mord">12</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:2.0463em;vertical-align:-0.686em;"></span><span class="mord"><span class="mopen nulldelimiter"></span><span class="mfrac"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:1.3603em;"><span style="top:-2.314em;"><span class="pstrut" style="height:3em;"></span><span class="mord"><span class="mord">800</span><span class="mord cjk_fallback">万</span></span></span><span style="top:-3.23em;"><span class="pstrut" style="height:3em;"></span><span class="frac-line" style="border-bottom-width:0.04em;"></span></span><span style="top:-3.677em;"><span class="pstrut" style="height:3em;"></span><span class="mord"><span class="mord">76.5</span><span class="mord cjk_fallback">万</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">+</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mord">47.5</span><span class="mord cjk_fallback">万</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.686em;"><span></span></span></span></span></span><span class="mclose nulldelimiter"></span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">×</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.6444em;"></span><span class="mord">12</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord">1.86</span><span class="mord cjk_fallback">美元</span><span class="mord">/</span><span class="mord cjk_fallback">瓦</span><span class="mpunct">⋅</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord cjk_fallback">年</span></span></span></span></span></p></div>
<div>

</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="45" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch9p044.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="45" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="45" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="45" style="" data-marpit-pagination-total="53" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="46" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch9p045.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="46" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="46" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="46" style="" data-marpit-pagination-total="53" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="47" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>分摊成本的优势</strong>
<ul>
<li>根据前面例题的计算，在数据中心内部，每小时0.11美元/服务器的费率远低于许多公司拥有和运行自有（较小）传统数据中心的成本</li>
<li>在数据中心外部，通过合理选址和布局，整体权衡成本和收益，还可以进一步优化资源使用</li>
<li>数据中心的成本优势导致大型互联网公司都将计算功能当作一种公用设施来提供，和电力一样，用户只需要为自己使用的那一部分付费即可</li>
</ul>
</li>
<li><strong>如今，公用计算有一个更响亮的名字——云计算</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch9p046.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="48" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>通过集中建设数据通信网络，可以：</strong>
<ul>
<li>转移供电压力，减少传输损耗</li>
<li>甚至可借助环境特点进一步改善能效</li>
</ul>
</li>
<li><strong>基于这个理念，在我们国家启动了&quot;东数西算&quot;工程，旨在：</strong>
<ul>
<li>帮助促进我国西部地区的数字经济发展</li>
<li>同时也在一定程度上缓解东部供电的压力</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch9p047.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="49" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>假设为服务东部沿海地区快速发展的互联网业务，需要建设一个包含100万台服务器的数据中心，这个数据中心年均用电量约为30亿KWh，这里有3种可能的场景：</strong>
<ul>
<li><strong>场景1</strong>：数据中心选址在东部沿海地区，就近服务用户，但需要从2000 Km外运煤过来进行本地发电供电</li>
<li><strong>场景2</strong>：数据中心选址在东部沿海地区，就近服务用户，但需要从2000 Km外通过特高压电网输电过来</li>
<li><strong>场景3</strong>：数据中心选址在煤矿附近，本地发电供应，但是需要通过光纤网络实现与2000 Km外的东部沿海地区互联</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch9p048.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="50" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>统一折算为每KWh电的成本，输煤发电为0.142元，远距离高压输电为0.138元，可是远距离光纤网络则仅需0.015元，优势明显</strong>
<ul>
<li>而且这个数据是比较理想的估算，没有考虑运煤、输电的损耗，还有不同区域的电费差异，东西部可以达到3倍以上，即1元和0.30元左右</li>
</ul>
</li>
<li><strong>这样一个拥有100万台服务器的数据中心：</strong>
<ul>
<li>若建设于东部，电费即可轻松突破年均30亿</li>
<li>若建设于西部，则仅需年均10亿电费外加光纤网络需要的年均不足1亿的信息网络使用费</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch9p049.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="51" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch9p050.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="51" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="51" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="51" style="" data-marpit-pagination-total="53" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="52" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9"><div class='columns'>
<div>
<ul>
<li><strong>附录I进一步介绍数据中心相关的扩展内容，并按照本章节相关主题进行分类。具体而言：</strong>
<ul>
<li>在附录I.1节介绍数据中心的可靠性，以数据中心常用的副本和纠删码技术为主</li>
<li>在附录I.2节介绍数据中心的可用性，以尾延迟问题和服务质量保障技术为主</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch9p051.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="53" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch9p052.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="53" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="53" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="53" data-size="16:9" data-marpit-advanced-background="content"></section>
