<h1 id="%E8%AE%A1%E7%AE%97%E6%9C%BA%E7%B3%BB%E7%BB%9F%E7%BB%93%E6%9E%84%E6%A6%82%E8%BF%B0">计算机系统结构概述</h1>
<p><strong>计算机系统结构</strong><br />
</p>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-class="lead" data-theme="gaia" lang="C" class="lead" data-marpit-pagination="1" style="" data-marpit-pagination-total="61" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="2" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<h2 id="%E6%9C%AC%E7%AB%A0%E5%86%85%E5%AE%B9">本章内容</h2>
<ul>
<li><strong>理解计算机系统、处理器和关键部件的发展过程及趋势</strong></li>
<li><strong>掌握计算机系统关键组成部件及通用架构</strong></li>
<li><strong>理解计算机系统结构定义及分类</strong></li>
<li><strong>掌握计算机量化评价方式和核心指标</strong></li>
<li><strong>掌握计算机系统设计原则并进行量化分析</strong></li>
<li><strong>理解计算机系统性能评价方法和工具</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="3" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>计算机广泛应用社会生活的方方面面</strong>
<ul>
<li>微型计算装置、物联网设备、移动手机、便携式计算机、台式计算机、服务器、超级计算机和互联网数据中心</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="4" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>人类使用机械装置提高力量</strong>
<ul>
<li>君子生非异也，善假于物</li>
</ul>
</li>
<li><strong>人类使用机械装置提高速度</strong>
<ul>
<li>荀子《劝学》</li>
</ul>
</li>
<li><strong>人类使用机械装置提高计算能力</strong>
<ul>
<li>算得更快、记得更多</li>
<li>提升信息处理能力</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="5" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>机械计算</strong>
<ul>
<li>算盘，根据口诀执行四则运算，无法自动执行</li>
</ul>
</li>
<li><strong>计算方式</strong>
<ul>
<li>模拟计算（风洞、光学和量子计算等）：利用特定物理过程通过输入/输出的映射模拟实现特定计算过程</li>
<li>数字计算：通过数字表示方法进行通用数字计算</li>
</ul>
</li>
<li><strong>自动数字计算</strong>
<ul>
<li>1822年提出的差分机（查尔斯·巴贝奇 Charles Babbage）</li>
<li>1943年电子数字计算机ENIAC（Electronic Numerical Integrator And Computer）</li>
<li>通用数字计算机</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="6" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>图灵机模型——自动机械证明</strong></p>
<ul>
<li>图灵工作的最初动机来源于数学家希尔伯特提出的&quot;判定问题&quot;形式化证明
<ul>
<li>1930年，哥德尔《论数学原理及有关系统的形式不可判定命题》</li>
<li>1936年，艾伦·图灵《论可计算数及其在判定问题中的应用》</li>
</ul>
</li>
<li>艾伦·麦席森·图灵为了形式化证明，提出了一种通用计算模型，也就是&quot;图灵机&quot;模型
<ul>
<li>图灵机假设有一条无限长方格纸带，每个方格可以储存一个符号，纸带可以左右移动</li>
<li>等价于定义一个有限状态机，定义状态及相应状态变迁操作</li>
<li>图灵证明任意复杂的计算都能按照图灵机模型执行特定机械操作</li>
<li>作为一种抽象，图灵机模型并没有给出物理计算机具体实现方法</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch1p006.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="7" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>冯·诺依曼计算机系统结构（工程模型）</strong>
<ul>
<li>1946年冯·诺依曼在《电子计算机逻辑设计初探》和《关于离散变量自动计算机的草案》报告中提出了存储程序和程序控制的思想</li>
<li>程序和运行程序所需要的数据以二进制的形式存放到存储器中（统一二进制表达）</li>
<li>&quot;存储程序&quot;是将解题的步骤编制成程序，也就是指令流</li>
<li>&quot;程序控制&quot;是计算机中的控制器逐条取出存储器中指令，结合计算机当前状态，控制各功能部件进行相应的操作</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="8" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>现代计算机发展驱动力</strong></p>
<ul>
<li>计算机技术的高速发展离不开理论科学（软件）、材料科学（器件）、工程科学（硬件）、应用需求（产业）的共同推动</li>
<li>处理器中的电子元件（晶体管）可以抽象为基本数字处理单元</li>
<li><strong>计算机系统结构发展动力</strong>
<ul>
<li>50多年来，晶体管不断缩小，当前晶体管尺寸为纳米规模，是十分精细的人工可制造及控制单元。可以认为晶体管是构建复杂计算芯片&quot;城市&quot;的基本&quot;砖石&quot;</li>
<li>如何基于海量的极小、极简元件构造出庞大而复杂的计算机呢？</li>
<li>在这极小和极大之间，需要一套科学理论和工程方法来指导计算机宏伟&quot;城市&quot;的设计和建设，这就是计算机系统结构的原理、方法和技术的研究范畴</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch1p008.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="9" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>通用计算机结构（硬件和软件）</strong></p>
<ul>
<li>计算机硬件包括中央处理器（CPU）、主板、主存储器（内存）、外部存储器（外存）和各种I/O设备</li>
<li>计算机软件采用操作系统管理各种硬件资源，提供抽象层支撑各种应用程序运行</li>
<li>硬件是软件的物理载体，软件是硬件的功能扩展</li>
</ul>
</div>
<div>
<p><img src="images/Ch1p009.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="10" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>计算机类型与设计目标</strong></p>
<ul>
<li>桌面计算机（Desktop Computers）</li>

<ul>
<li><strong>半导体器件是集成电路的基石，是计算机硬件基础</strong>
<ul>
<li>任何物理器件在时间和空间上都有物理限制</li>
</ul>
</li>
<li><strong>集成电路的制造工艺是用特征尺寸来衡量</strong>
<ul>
<li>从1971年的10微米下降到2022年的&quot;4纳米&quot;</li>
<li>特征尺寸线性下降时，晶体管密度将平方上升</li>
<li>晶体管性能的提高与特征尺寸的降低成线性关系</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="12" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>处理器中晶体管数量的指数级增长</strong></p>
<ul>
<li>高登·摩尔（Gordon Moore）提出，最初预测晶体管密度会每年翻一番</li>
<li>实际上晶体管数目每年大约增长40%~55%，或者说每18-24个月翻番</li>
<li>2003年摩尔定律开始放缓，2016年实际增长率为摩尔定律预测的十分之一</li>
</ul>
</div>
<div>
<p><img src="images/Ch1p012.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="13" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>登纳德缩放定律</strong>
<ul>
<li>晶体管密度增加，每个晶体管尺寸变小，相应能耗也会降低，每平方毫米硅芯片能耗几乎保持恒定</li>
<li>登纳德缩放定律从2004年开始大幅放缓，2012年左右接近失效</li>
</ul>
</li>
<li><strong>原因</strong>
<ul>
<li>晶体管不再越小、越快、越节能</li>
<li>处理器频率增加受限</li>
<li>微处理器整体功率受限</li>
</ul>
</li>
<li><strong>结果</strong>
<ul>
<li>整体而言处理器性能提升变慢，即每20年才能翻倍一次</li>
<li>单个处理器内开始包含高效能和高性能异构处理核</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="14" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>处理器近四十年整体发展</strong>
<ul>
<li>第一阶段（1978年-1986年），单处理器年增长率大约为25%</li>
<li>第二阶段（1986年到2003年），处理器器件和系统结构技术的共同发展促成了计算机性能年增长率提升到大约为52%</li>
<li>第三阶段（2003年到2011年），单处理器年增长率下降到大约为23%</li>
<li>第四阶段（2011年到2021年），性能年增长率从12%降到3.5%</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="15" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch1p015.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="15" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="15" style="" data-marpit-pagination-total="61" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="16" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch1p016.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="16" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="16" style="" data-marpit-pagination-total="61" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="17" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>基础元器件物理性能的提升速度在降低</strong></li>
<li><strong>芯片功率作用甚至比连线延迟还要重要</strong></li>
<li><strong>当前降低能耗和成本、提高性能的唯一途径是应用定制化</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="18" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>动态随机存储器（Dynamic Random Access Memory，DRAM）</strong>
<ul>
<li>为处理器提供数据快速存储</li>
<li>DRAM同样采用半导体工艺，也遵循摩尔定律</li>
<li>DRAM容量增长速度随时间的变化（每2-4年翻一倍）</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="19" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>

<li>闪存固态盘、非易失性内存</li>
<li>磁盘一直是最主要的外存储器件，目前人类社会绝大多数数据仍存放在磁盘中</li>
</ul>
</li>

<ul>
<li><strong>带宽和延迟</strong>
<ul>
<li>带宽可以通过多部件方式提升</li>
<li>延迟较难提高</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="22" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>计算机系统结构的定义</strong></p>
<ul>
<li>计算机系统结构（Computer Architecture）和计算机体系结构具有相同的英文名
<ul>
<li>狭义计算机系统结构通常特指计算机体系结构</li>
<li>40年前计算机体系结构一般特指指令集体系架构（Instruction Set Architecture，ISA）</li>
<li>计算机系统结构不再仅限于研究处理器，研究范畴不断拓展</li>
</ul>
</li>
<li>钱学森定义：系统是由相互作用、相互依赖的若干组成部分结合而成的，具有特定功能的有机整体</li>
<li><strong>计算机系统结构定义为：满足设计目标需求的计算机软硬部件的系统组织方式</strong></li>
<li>Patterson从功能和性能角度定义：设计满足目标要求计算平台的科学和艺术</li>
</ul>
</div>
<div>
<p><img src="images/Ch1p022.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="23" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>如何组织海量晶体管实现应用功能</strong></p>
<ul>
<li>基本物理单元是晶体管，计算机系统世界的&quot;原子&quot;或者&quot;砖&quot;，存在无限大的设计空间</li>
<li>计算机系统结构通过分层、分模块设计方式，把层间、模块内的设计复杂度控制在一个可接受的范围内</li>
<li>计算机系统结构也研究计算机系统抽象层的设计方法和实现机制</li>
</ul>
</div>
<div>
<p><img src="images/Ch1p023.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="24" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<p><strong>五类计算机的功能需求</strong></p>
<ul>
<li>首先确定计算机系统的必要属性和功能</li>
<li>其次考虑在成本、可靠性、功耗、安全性等约束下最大化性能（综合设计）</li>
<li>最后充分掌握实现方式细节</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="25" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>计算机系统结构研究范畴</strong>
<ul>
<li><strong>单机系统结构</strong>
<ul>
<li>流水线微架构：静态和动态指令调度，超标量和多线程，分支预测、猜测执行等</li>
<li>存储层次结构：缓存策略和算法、多级缓存、虚拟内存、外存I/O和数据管理等</li>
</ul>
</li>
<li><strong>多处理器结构</strong>
<ul>
<li>数据缓存一致性、数据共享和同步机制、网络拓扑结构和通信寻径等</li>
</ul>
</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="26" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>性能提升：采用多个部件，并能让多个任务并行执行</strong></li>
<li><strong>迈克尔·弗林：指令流及数据流并行分类</strong>
<ul>
<li>单指令流、单数据流（SISD）</li>
<li>单指令流、多数据流（SIMD）</li>
<li>多指令流、多数据流（MIMD）</li>
<li>多指令流、单数据流（MISD）</li>
</ul>
</li>
<li><strong>软件并行：数据级并行，任务级并行</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="27" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>计算机是针对任务工作负载的服务装置</strong></li>
<li><strong>任务具有不同的类型、数据访问模式等特征</strong></li>
<li><strong>在给定时间内处理的一系列任务序列称之为工作负载</strong>
<ul>
<li>工作负载具有各种特征，例如任务类型分布、强度变化等</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="28" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>任务执行时间</strong>
<ul>
<li>可被观察、被测量，是评估一个系统性能的核心指标</li>
<li>其快慢是用户最能直观感受到的服务体验</li>
<li>响应时间、服务时间、处理延迟等</li>
</ul>
</li>
<li><strong>任务是相对的</strong>：应用程序、I/O请求</li>
<li><strong>通过任务执行时间相对快慢来评价系统的性能高低（加速比）</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="29" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>任务吞吐率</strong></p>
<ul>
<li>单位时间内完成的任务总数
<ul>
<li>网络：每秒位数（bps）</li>
<li>存储设备：每秒兆字节数（MB/s）或者每秒I/O数（IOPS）</li>
<li>数据库：每秒查询数（QPS）</li>
</ul>
</li>
<li><strong>实际吞吐率依赖于工作负载行为</strong>
<ul>
<li>服务装置通常是被动接受并处理任务</li>
<li>单位时间内任务发送数量称之为负载强度</li>
<li>不断增加负载强度到一定值之后，实际吞吐率不会再增加，这个吞吐率称之为峰值吞吐率</li>
<li>峰值吞吐率是系统内在禀性的反映</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch1p029.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="30" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>功率与散热设计</strong></p>
<ul>
<li>计算机及其部件的运行需要消耗能量，设计者在系统和部件两个层次考虑功率和电流设计
<ul>
<li>首先必须确定最高功率</li>
<li>主动调节，适应电源功率供给及其变化</li>
<li>必须在内部部件之间合理分配能量供给</li>
</ul>
</li>
<li>根据热力学第二定律，功耗最终都会变成热能
<ul>
<li>热设计功率（Thermal Design Power，TDP）：当处理器达到最大负荷时所释放的热量，决定了冷却需求</li>
<li>现代处理器提供两个方法来帮助主动管理过热：降低时钟速率或强制断电</li>
</ul>
</li>
<li><strong>能耗和能耗效率</strong>：功率是单位时间消耗的能量，而能耗是一段时间内消耗功率的总和</li>
</ul>
</div>
<div>
<p><img src="images/Ch1p030.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="31" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>CMOS芯片的动态能耗</strong>
<ul>
<li>每个晶体管的能耗与电容性负载（Capacitive Load）与电压平方的乘积成正比：能耗动态 ∝ 电容性负载 × 电压²</li>
<li>一次转换（0→1或1→0）的能耗：能耗动态 ∝ 1/2 × 电容性负载 × 电压²</li>
<li>每个晶体管所需要的功率：功率动态 ∝ 1/2 × 电容性负载 × 电压² × 开关频率</li>
</ul>
</li>
<li><strong>对于一项固定任务，降低时钟频率可以降低功率，但增加执行时间，不一定会降低能耗</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="32" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>例题：电压降低15%对动态能耗和动态功率的影响</strong></p>
<ul>
<li>由于电容值不变，所以能耗变化就是电压平方之比
<ul>
<li>能耗新/能耗原 = (电压×0.85)²/电压² = 0.85² = 0.72</li>
<li>动态能耗降低为原来的72%</li>
</ul>
</li>
<li>对于功率，需要考虑开关频率的比值
<ul>
<li>功率新/功率原 = 0.72 × 0.85 = 0.61</li>
<li>动态功率降低为原来的61%</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch1p032.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="33" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch1p033.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="33" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="33" style="" data-marpit-pagination-total="61" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="34" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>处理器A比处理器B高20%的功率，但是完成同样的任务，A的执行时间是B的70%，那么A完成这个任务的总能耗为1.2×0.7=0.84</strong></li>
<li><strong>对于移动装置，其电池电量是固定的，提高任务能效非常重要</strong></li>
<li><strong>功率分配、散热、避免热点已经成为越来越困难的问题</strong></li>
<li><strong>在保证时钟频率和电源电压不变的情况下</strong>
<ul>
<li>闲时关闭</li>
<li>动态电压-频率调整（Dynamic voltage-frequency scaling, DVFS）</li>
<li>针对典型情景的设计</li>
<li>超频</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="35" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>计算机应用范围越广，其成本和价格就越成为一个关键因素</strong></li>
<li><strong>评估成本是困难的</strong>
<ul>
<li>成本会不断变化，不同行业和部门能够看到的成本是不同的</li>
<li>决定了是否在新设计中使用某一项新功能或者新技术</li>
</ul>
</li>
<li><strong>计算机组件的制造成本会随着时间而降低（学习曲线）</strong></li>
<li><strong>产量是决定成本的第二个重要因素</strong>
<ul>
<li>产量提升缩短了学习曲线所需要的时间</li>
<li>产量的增加会提高购买与制造效率</li>
<li>产量增加摊销成本</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="36" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>集成电路成本公式</strong></p>
<ul>
<li>已封装集成电路的成本为：集成电路成本 = (晶片成本 + 晶片测试成本 + 封装和最终测试成本) / 最终测试成品率</li>
<li><strong>晶片成本公式</strong>：
<ul>
<li>晶片成本 = 晶圆成本 / (每个晶圆上的晶片数 × 晶片成品率)</li>
<li>每个晶圆上的晶片数 ≈ π × (晶圆直径/2)² / 晶片面积</li>
</ul>
</li>
<li><strong>更准确的估算公式</strong>：
<ul>
<li>每个晶圆上的晶片数 = (π × (晶圆直径/2)² - π × 晶圆直径) / 晶片面积</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch1p036.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="37" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>例题：求300mm晶圆上的晶片数目</strong>
<ul>
<li>当晶片面积为2.25cm²时：每个晶圆上的晶片数目 = (706.9 - 94.2) / 2.25 ≈ 270</li>
<li>当晶片面积为1.00cm²时：每个晶圆上的晶片数目 = (706.9 - 94.2) / 1.00 ≈ 640</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="38" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>集成电路成品率模型：假定晶圆上的缺陷是随机分布的</strong>
<ul>
<li>晶片成品率 = 晶圆成品率 × (1 / (1 + 单位面积上的缺陷 × 晶片面积))^N</li>
</ul>
</li>
<li><strong>例题：设每平方厘米上有0.047个缺陷，N为12</strong>
<ul>
<li>较大晶片（2.25cm²）：成品率 = 1/(1+0.047×2.25)^12 ≈ 0.30</li>
<li>较小晶片（1.00cm²）：成品率 = 1/(1+0.047×1.00)^12 ≈ 0.58</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="39" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>部件可靠性和可用性</strong></p>
<ul>
<li><strong>可靠性度量</strong>
<ul>
<li>部件可靠性是从一个参考初始时刻开始持续服务的度量</li>
<li>平均无故障时间（MTTF）：发生故障之前的正常工作时间</li>
<li>平均修复时间（MTTR）：服务中断后恢复正常的时间</li>
<li>平均故障间隔时间（MTBF）= MTTF + MTTR</li>
<li>如果一组部件的寿命时间满足负指数分布，整体故障率就是各模块故障率之和</li>
</ul>
</li>
<li><strong>可用性度量</strong>
<ul>
<li>部件可用性 = MTTF / (MTTF + MTTR)</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch1p039.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="40" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>例题：磁盘子系统MTTF计算</strong>
<ul>
<li>10个磁盘：均为1000000小时MTTF</li>
<li>1个ATA控制器：500000小时MTTF</li>
<li>1个电源：200000小时MTTF</li>
<li>1个风扇：200000小时MTTF</li>
<li>1根ATA电缆：1000000小时MTIF</li>
</ul>
</li>
<li><strong>解答：故障率之和 = 10×1/1000000 + 1/500000 + 1/200000 + 1/200000 + 1/1000000 = 23/1000000</strong></li>
<li><strong>系统的MTTF = 1000000/23 ≈ 43500小时（略低于5年）</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="41" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>冗余电源可靠性</strong></p>
<ul>
<li>冗余电源对的MTTF合理近似为：MTTF_电源对 ≈ MTTF²_电源 / (2 × MTTR_电源)</li>
<li>使用上例数据（操作人员需要24小时才能更换）
<ul>
<li>MTTF_电源对 ≈ 200000² / (2 × 24) ≈ 8.3亿小时</li>
</ul>
</li>
<li>使用电源对的可靠程度约为单电源的4150倍</li>
</ul>
</div>
<div>
<p><img src="images/Ch1p041.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="42" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>系统分层设计原则</strong></li>
<li><strong>并行性设计与挖掘原则</strong></li>
<li><strong>局域性挖掘原则</strong></li>
<li><strong>加快经常事件原则</strong></li>
<li><strong>平衡设计原则</strong></li>
<li><strong>性能评价驱动设计原则</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="43" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>分层抽象设计</strong></p>
<ul>
<li>计算机系统整体设计空间巨大且复杂，通过分层抽象设计，保证每层涉及组件数量和复杂度有限
<ul>
<li>计算机系统涉及范围从纳米级晶体管电路到百万服务器规模的仓储式计算机</li>
</ul>
</li>
<li>层间定义相对固定抽象接口，可以抽象为上层的一个基本组件
<ul>
<li>这样在每层可以进行相对独立的专业化、产业化的设计与开发</li>
<li>可通过垂直层间的高效分工和合作，实现计算机系统的整体演进</li>
</ul>
</li>
<li>功能层次化划分是计算机系统设计中常用的思考方式</li>
</ul>
</div>
<div>
<p><img src="images/Ch1p043.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="44" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>计算机系统整体功能栈（9个功能层）</strong></p>
<ol>
<li>物理电子层：基础电子材料、晶体管材料（石墨烯）、结构和制造工艺</li>
<li>器件层（Device）：构造基础逻辑元器件（与门、与非门等）</li>
<li>逻辑电路层：组合逻辑电路和时序电路</li>
<li>微体系结构层（Microarchitecture）</li>
<li>指令集体系结构层（ISA）：计算机硬件和软件的分界层</li>
<li>运行时系统软件层：操作系统、虚拟机、编译器等</li>
<li>开发语言和环境：各种编程语言和编译平台</li>
<li>算法层：针对共性问题提供算法解决方案</li>
<li>应用层：给用户提供功能性程序满足特定应用需求</li>
</ol>
</div>
<div>
<p><img src="images/Ch1p044.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="45" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>计算机系统中可以通过增加组件数量提高整体处理能力</strong>
<ul>
<li>空间并行：增加功能相同部件的数量，每个部件独立处理任务</li>
<li>时间并行：一组部件合作完成一个任务，每个部件仅执行任务特定环节</li>
<li>计算机系统每层都可以增加并行性（系统并行度）</li>
</ul>
</li>
<li><strong>任务具有并行性</strong>：指令级并行、请求级并行和线程级并行</li>
<li><strong>需要发掘硬件和任务内在并行性</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="46" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>局域性原理</strong></p>
<ul>
<li>程序常常重复使用它们最近用过的数据和指令</li>
<li><strong>两种类型：时间局域性和空间局域性</strong>
<ul>
<li>时间局域性：最近访问过的内容很可能会在短期内被再次访问</li>
<li>空间局域性：地址相互临近的对象很可能会在短时间内被用到</li>
<li>来源于人类思考问题的方式</li>
</ul>
</li>
<li><strong>经验规律：一个程序90%的执行时间花费在仅10%的代码中</strong></li>
<li>局域性意味着可以根据程序最近访问的指令，比较准确地预测近期将执行的内容</li>
</ul>
</div>
<div>
<p><img src="images/Ch1p046.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="47" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>加快经常性事件原则就是指重点关注常见情形，常见情形优先于非常见情形</strong>
<ul>
<li>优化频繁出现的场景，会产生更显著的整体效果</li>
<li>也适应于可靠性、能耗优化等方面</li>
</ul>
</li>
<li>在计算机系统设计中会大量使用这一简单原则，需要通过统计和分析过去的负载行为来确定哪些是常见情形</li>
<li>加快经常性事件原则能使性能提高多少，可以使用Amdahl定律来量化</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="48" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>根据设计目标要求，协同多个部件完成任务处理流程，需要整体优化设计，保证所有部件平衡工作，避免局部成为瓶颈</strong>
<ul>
<li>整体性能往往取决于瓶颈部件或者关键步骤的性能</li>
<li>努力使得每个部件工作在最佳工作范围，也就是平衡点</li>
<li>多个系统指标之间也需要平衡</li>
</ul>
</li>
<li><strong>一旦组成部件技术进化，可能导致过去较好平衡的系统结构方案可能不再平衡</strong>
<ul>
<li>旧平衡被打破，需要设计新的平衡</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="49" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>性能评价的困难性</strong></p>
<ul>
<li>客观评价计算机系统性能是困难的
<ul>
<li>由大量软硬部件构成的复杂系统</li>
<li>工作负载也是多样、多变的</li>
<li>先验模型难以准确预测计算机系统的运行时性能</li>
</ul>
</li>
<li>外部市场、应用需求和内部技术发展合力推动计算机系统不断进化
<ul>
<li>计算机系统结构的演化就是基于不断的性能评价和迭代开发</li>
<li>系统设计者需要在设计时确定性能目标、测试方法和测试平台</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch1p049.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="50" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>Amdahl定律</strong></p>
<ul>
<li>采用Amdahl定律定量评价和分析加速比（speedup）
<ul>
<li>加速比 = 整个任务在采用该升级时的性能 / 整个任务在未采用该升级时的性能</li>
<li>或：加速比 = 整个任务在未采用该升级时的执行时间 / 整个任务在采用该升级时的执行时间</li>
</ul>
</li>
<li><strong>Amdahl定律刻画了局部加速比和全局加速比之间的关系</strong>
<ul>
<li>原计算机计算时间中可改进部分所占的比例（改进比例）</li>
<li>改进部分的局部加速比</li>
</ul>
</li>
<li><strong>总加速比 = 1 / (1 - 改进比例 + 改进比例 / 局部加速比)</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch1p050.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="51" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>例题：新处理器执行Web服务应用的速度是原处理器的10倍，原处理器有40%的时间忙于计算，60%的时间等待I/O</strong></li>
<li><strong>解答：改进比例=0.4；局部加速比=10</strong>
<ul>
<li>总加速比 = 1 / (0.6 + 0.4/10) = 1 / 0.64 ≈ 1.56</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="52" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>例题：比较两种FP优化方案</strong></p>
<ul>
<li>方案一：升级FPSQR硬件，使这一运算速度提高到原来的10倍
<ul>
<li>FPSQR占用20%的执行时间</li>
<li>加速比 = 1 / (0.8 + 0.2/10) = 1/0.82 ≈ 1.22</li>
</ul>
</li>
<li>方案二：让所有FP指令的运行速度提高到原来的1.6倍
<ul>
<li>FP指令占用50%的执行时间</li>
<li>加速比 = 1 / (0.5 + 0.5/1.6) = 1/0.8125 ≈ 1.23</li>
</ul>
</li>
<li>提高整体FP运算的性能稍好一些，体现了加快经常性事件原理</li>
</ul>
</div>
<div>
<p><img src="images/Ch1p052.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="53" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>CPU性能公式</strong></p>
<ul>
<li>处理器以时钟周期作为运行时间单位</li>
<li><strong>CPU时间 = 程序的CPU时钟周期数 × 时钟周期时间</strong>
<ul>
<li>或：CPU时间 = 程序的CPU时钟周期数 / 频率</li>
</ul>
</li>
<li><strong>CPI（每条指令的平均时钟周期数）</strong>
<ul>
<li>CPI = 程序的CPU时钟周期数 / 指令数</li>
</ul>
</li>
<li><strong>CPU时间 = 指令数 × CPI × 时钟周期时间</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch1p053.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="54" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>处理器总时钟周期与总CPI</strong></p>
<ul>
<li><strong>总时钟周期 = Σ ICᵢ × CPIᵢ</strong></li>
<li><strong>CPU时间 = (Σ ICᵢ × CPIᵢ) × 时钟周期时间</strong></li>
<li><strong>总CPI = Σ ICᵢ × CPIᵢ / IC = Σ (ICᵢ / IC) × CPIᵢ</strong>
<ul>
<li>也就是各种指令CPI和该指令在一个程序中所占比例的加权平均</li>
</ul>
</li>
<li>CPI应当通过实际测量得出，因为多种因素影响，包括流水线、缓存缺失和存储系统等</li>
</ul>
</div>
<div>
<p><img src="images/Ch1p054.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="55" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>例题：两种CPI优化方案对比</strong>
<ul>
<li>FP操作频率=25%，平均CPI=4.0</li>
<li>其他指令的平均CPI=1.33</li>
<li>FPSQR的频率=2%，CPI=20</li>
</ul>
</li>
<li><strong>原CPI = (4×25%) + (1.33×75%) = 2.0</strong></li>
<li><strong>改进FPSQR后CPI = 2.0 - 2%×(20-2) = 1.64</strong></li>
<li><strong>改进所有FP指令后CPI = (75%×1.33) + (25%×2.5) = 1.625</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="56" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="56" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>CPI例题（续）</strong></p>
<ul>
<li>改进FP指令后的CPI（1.625）比改进FPSQR指令后CPI（1.64）更低，所以性能更好</li>
<li><strong>加速比 = CPI原 / CPI新FP = 2.0 / 1.625 ≈ 1.23</strong></li>
<li>使用Amdahl定律可以计算出相同的加速比</li>
</ul>
</div>
<div>
<p><img src="images/Ch1p056.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="57" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="57" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>性能测量方法</strong></p>
<ul>
<li><strong>基准程序测试方法</strong>
<ul>
<li>基准测试：选择最常用、最具代表性的程序作为标准测试程序</li>
<li>基准测试应用程序集（称为基准测试套件），例如标准性能评估机构（SPEC）</li>
</ul>
</li>
<li><strong>工作负载测试方法</strong>
<ul>
<li>完全运行测量真实应用程序是最客观的</li>
<li>宏基准测试程序（Macrobenchmark）：模拟部分或全部真实应用程序的行为</li>
<li>微基准测试程序（Microbenchmark）：创建负载组合请求类型、大小、强度等</li>
</ul>
</li>
<li><strong>基于追踪记录（Trace）测试方法</strong>
<ul>
<li>从真实生产系统中抓取实际的请求行为并记录到追踪文件（trace）中</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/Ch1p057.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="58" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="58" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"><div class='columns'>
<div>
<p><strong>性能综合评价方法</strong></p>
<ul>
<li>使用SPECRatio和几何均值综合汇总套件的性能结果
<ul>
<li>SPECRatio = 执行时间基准 / 执行时间</li>
</ul>
</li>
<li><strong>几何平均 = <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mo stretchy="false">(</mo><mo>∏</mo><msub><mtext>SPECRatio</mtext><mi>i</mi></msub><msup><mo stretchy="false">)</mo><mrow><mn>1</mn><mi mathvariant="normal">/</mi><mi>n</mi></mrow></msup></mrow><annotation encoding="application/x-tex">(\prod \text{SPECRatio}_i)^{1/n}</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1.138em;vertical-align:-0.25em;"></span><span class="mopen">(</span><span class="mop op-symbol small-op" style="position:relative;top:0em;">∏</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord"><span class="mord text"><span class="mord">SPECRatio</span></span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">i</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mclose"><span class="mclose">)</span><span class="msupsub"><span class="vlist-t"><span class="vlist-r"><span class="vlist" style="height:0.888em;"><span style="top:-3.063em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mtight">1/</span><span class="mord mathnormal mtight">n</span></span></span></span></span></span></span></span></span></span></span></span></strong></li>
<li><strong>几何均值的两个重要特性：</strong>
<ol>
<li>这些比值的几何均值与几何均值之比相等</li>
<li>几何均值之比等于性能比值的几何均值，与基准计算机的选择无关</li>
</ol>
</li>
<li>因此，使用几何均值更加合理</li>
</ul>
</div>
<div>
<p><img src="images/Ch1p058.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="59" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch1p060.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="59" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="59" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="59" style="" data-marpit-pagination-total="61" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="60" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="60" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9">
<ul>
<li><strong>补充处理器价格和成本知识</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="61" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="61" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="61" data-size="16:9"></section>
