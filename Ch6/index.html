</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="44" style="" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="45" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch6p053.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="45" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="45" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="45" style="" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="46" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch6p054.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="46" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="46" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="46" style="" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="47" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch6p055.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="47" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="47" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="47" style="" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="48" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="raid-5%E5%9D%97%E4%BA%A4%E5%8F%89%E5%88%86%E5%B8%83%E5%BC%8F%E5%A5%87%E5%81%B6%E6%A0%A1%E9%AA%8C">RAID 5（块交叉分布式奇偶校验）</h2>
<p><strong>块交叉分布奇偶校验磁盘阵列：</strong> 数据以块交叉的方式存于各盘，无专用冗余盘，<strong>奇偶校验信息均匀分布在所有磁盘上</strong>。</p>
<p>相对于 RAID 4，校验块分散在所有盘上，避免了校验盘的写瓶颈。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="49" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch6p060.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="49" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="49" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="49" style="" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="50" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="raid-6pq-%E5%8F%8C%E6%A0%A1%E9%AA%8C">RAID 6（P+Q 双校验）</h2>
<ul>
<li>相对于 RAID 5，增加了一个独立的第二个校验（Q）</li>
<li><strong>校验空间开销是 RAID 5 的两倍</strong></li>
<li><strong>可容忍两个磁盘出错</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="51" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="raid-10-%E4%B8%8E-raid-01">RAID 10 与 RAID 01</h2>
<p><strong>RAID 10（RAID 1+0）：</strong> 先进行镜像（RAID 1），再进行条带存放（RAID 0）</p>
<p><strong>RAID 01（RAID 0+1）：</strong> 先进行条带存放（RAID 0），再进行镜像（RAID 1）</p>
<p>两者均具有容错能力，但组合方式不同导致性能和可靠性有所差异。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="52" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="raid-%E5%AE%9E%E7%8E%B0%E6%96%B9%E5%BC%8F">RAID 实现方式</h2>
<p>实现磁盘阵列的方式主要有三种：</p>
<ul>
<li><strong>软件方式（Linux MD）：</strong> 阵列管理软件由主机实现。优点是成本低；缺点是占用主机时间</li>
<li><strong>阵列卡方式：</strong> RAID 管理软件固化在 I/O 控制卡上，不占用主机时间，一般用于服务器和 PC</li>
<li><strong>专用磁盘阵列：</strong> 基于通用接口总线的开放式平台，可被多个服务器同时存取</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="53" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="%E5%AD%98%E5%82%A8%E7%B3%BB%E7%BB%9F%E7%BB%93%E6%9E%84">存储系统结构</h2>
<p>存储系统不仅需要高性能 I/O 和可靠大容量存储，还需要提供数据存储组织管理的能力。应用程序可以通过标准接口方便存取海量数据。</p>
<p><strong>存储栈（Storage Stack）：</strong> 应用数据请求逐层下发送到设备，之后再逐层向上响应请求。每层都执行特定的处理。</p>
<p><strong>两级存储空间映射：</strong></p>
<ul>
<li><strong>第一级：</strong> 文件命名空间 → 逻辑存储空间（数据块/页空间）的映射</li>
<li><strong>第二级：</strong> 逻辑存储空间（卷/单元）→ 物理存储空间（存储设备/分区/单元）的映射</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="54" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E5%AD%98%E5%82%A8%E6%A0%88%E5%A4%84%E7%90%86%E8%BF%87%E7%A8%8B">存储栈处理过程</h2>
<ol>
<li>文件系统为用户和应用程序提供文件目录树视图，内部把文件/目录读写请求转化为逻辑块层请求</li>
<li>逻辑块层向上提供统一数据块地址空间，内部把逻辑块请求转换为设备块 I/O 请求</li>
<li>通用块层提供 I/O 合并、写吸收等 I/O 优化调度</li>
<li>设备驱动层执行设备相关的优化，如针对磁盘的 I/O 调度方法</li>
<li>I/O 设备驱动程序执行物理 I/O，通过总线发送给设备端控制器</li>
<li>设备控制器具体负责对其内部存储介质的数据读写</li>
</ol>
</div>
<div>
<p><img src="images/Ch6p067.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="55" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9"><div class='columns'>
<div>
<h2 id="linux-%E6%9C%AC%E5%9C%B0%E5%AD%98%E5%82%A8%E7%BB%93%E6%9E%84">Linux 本地存储结构</h2>
<p>应用程序通过用户态标准 I/O 库调用标准文件接口存取文件数据，文件系统把文件请求转化为相应数据块读写操作，通过缓存层、块存储层和驱动层最终交给存储设备。</p>
<p><strong>存储栈各层：</strong></p>
<ul>
<li><strong>虚拟文件系统（VFS）层：</strong> 提供通用文件存取接口，可同时接受多个文件操作请求</li>
<li><strong>具体文件系统：</strong> 处理文件请求转化为数据块存取</li>
<li><strong>页缓存机制：</strong> 加速数据块存取，提高性能</li>
</ul>
</div>
<div>
<p><img src="images/Ch6p068.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="56" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="56" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E8%AE%BE%E5%A4%87%E9%A9%B1%E5%8A%A8%E7%A8%8B%E5%BA%8F">设备驱动程序</h2>
<p>现代操作系统为每个设备提供设备驱动程序。驱动程序定义一组编程接口，隐藏设备的工作细节，将调用映射到物理设备的特有 I/O 操作上，包括对设备进行初始化、参数有效性检查、执行 I/O 过程、管理电源和日志等。</p>
<p><strong>驱动程序工作模式：</strong></p>
<ul>
<li><strong>阻塞模式：</strong> 通过中断来解除阻塞状态</li>
<li><strong>非阻塞模式：</strong> 通过轮询检测完成信号，尽快响应请求完成</li>
</ul>
<p>设备驱动必须可重入。</p>
</div>
<div>
<p><img src="images/Ch6p069.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="57" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="57" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="%E6%96%87%E4%BB%B6%E7%B3%BB%E7%BB%9F">文件系统</h2>
<p>文件系统和存储设备互为表里。文件系统是最重要的数据管理和存储系统，对应用程序提供文件/目录数据抽象及相应处理接口。</p>
<p>文件系统为应用提供文件/目录数据抽象及相应处理接口，内部维护文件逻辑空间到物理存储空间之间的映射，并执行数据处理操作，屏蔽底层存储特性和 I/O 过程。</p>
<p><strong>文件存取操作：</strong> IEEE 制定的 POSIX 定义了文件级存取接口及其操作语义。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="58" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="58" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E6%96%87%E4%BB%B6%E7%B3%BB%E7%BB%9F%E5%91%BD%E5%90%8D%E7%A9%BA%E9%97%B4%E4%B8%8E%E5%9D%97%E5%AD%98%E5%82%A8">文件系统命名空间与块存储</h2>
<p><strong>文件：</strong> 具有独立逻辑地址空间的抽象数据容器。应用程序可以把数据序列化后保存到文件之中。</p>
<p><strong>文件目录：</strong> 以文件和目录结构形式对外提供统一命名空间（通常是树形结构），有利于大量文件的组织和管理。</p>
<p><strong>块存储空间：</strong> 由一组固定大小单元（Block）线性编址构成，固定单元也称为页、段等。</p>
<ul>
<li>CPU 访问内存是按字节编址</li>
<li>访问外存时，通过 I/O 请求中的间接寻址扩充可访问空间</li>
<li><strong>LBA（Logical Block Address）</strong> 是逻辑块地址</li>
<li><strong>PBA（Physical Block Address）</strong> 是物理块地址</li>
</ul>
</div>
<div>
<p><img src="images/Ch6p071.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="59" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="59" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E6%96%87%E4%BB%B6%E7%B3%BB%E7%BB%9F%E5%85%83%E6%95%B0%E6%8D%AE">文件系统元数据</h2>
<p>文件系统实现文件和文件目录结构到逻辑卷空间之间的映射。核心是一组数据结构（元数据）：</p>
<ul>
<li><strong>超级块：</strong> 存储文件系统基本信息</li>
<li><strong>存储分配表：</strong> 记录磁盘块的使用情况</li>
<li><strong>文件索引表（inode）：</strong> 记录文件的属性和文件块到数据块索引结构</li>
</ul>
<p>inode 中最重要的数据结构是实现<strong>文件块→数据块</strong>索引结构，即文件内部逻辑块地址到逻辑卷块地址映射。</p>
</div>
<div>
<p><img src="images/Ch6p073.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="60" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="60" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="%E6%9C%AC%E5%9C%B0%E5%AD%98%E5%82%A8%E4%B8%8E%E7%BD%91%E7%BB%9C%E5%AD%98%E5%82%A8%E7%BB%93%E6%9E%84">本地存储与网络存储结构</h2>
<p><strong>DAS（Direct-Attached Storage）：</strong> 在单机系统中，CPU 通过总线连接到物理存储设备，操作系统管理存储设备中的数据。受限于总线电气特性和带宽，不能连接过多存储设备。</p>
<p><strong>四种基本网络存储结构：</strong></p>
<ul>
<li>存储区域网（SAN）</li>
<li>附网存储（NAS）</li>
<li>iSCSI 存储</li>
<li>分布式文件系统</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="61" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="61" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9"><div class='columns'>
<div>
<h2 id="nas%E9%99%84%E7%BD%91%E5%AD%98%E5%82%A8">NAS（附网存储）</h2>
<p>NAS 是通过网络向用户提供文件级服务的存储服务器，将硬件和软件有机地集成在一起，为多个用户提供文件视图。</p>
<p><strong>优点：</strong></p>
<ul>
<li>异构平台下的文件共享</li>
<li>充分利用现有局域网结构</li>
<li>容易安装、使用和管理</li>
<li>基于 IP/Ethernet 及标准 NFS/CIFS，可适应复杂网络环境</li>
<li>较低的总拥有成本</li>
</ul>
</div>
<div>
<p><img src="images/Ch6p076.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="62" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="62" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9"><div class='columns'>
<div>
<h2 id="san%E5%AD%98%E5%82%A8%E5%8C%BA%E5%9F%9F%E7%BD%91">SAN（存储区域网）</h2>
<p>SAN 是一种以网络为中心的存储结构，利用专用网络（Fibre Channel）连接服务器和存储设备，直接传送 block I/O 数据。</p>
<p><strong>优点：</strong></p>
<ul>
<li>高性能、高速存取（Infiniband 可提供 100 Gbps 带宽）</li>
<li>高可用性，具有更多冗余存储空间</li>
<li>集中存储和管理，形成统一的存储池</li>
<li>高可扩展性，服务器和存储设备相分离</li>
</ul>
<p><strong>弱点：</strong> 设备的互操作性较差，依赖专用网络协议。</p>
</div>
<div>
<p><img src="images/Ch6p077.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="63" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="63" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9"><div class='columns'>
<div>
<h2 id="iscsi">iSCSI</h2>
<p>iSCSI 在 TCP/IP 上封装 SCSI 存储协议，是一种基于 IP 的 SAN。采用 Initiator/Target 实现模式。</p>
<p><strong>工作流程：</strong></p>
<ol>
<li>应用程序通过系统调用访问文件系统</li>
<li>文件系统解释 I/O 命令，发送给 SCSI 上层驱动程序</li>
<li>SCSI 驱动程序将 I/O 命令转化为 SCSI 命令，发给 iSCSI Initiator</li>
<li>iSCSI Initiator 把 SCSI 命令通过网络发送到 iSCSI Target</li>
<li>iSCSI Target 解析并执行命令，数据按原路返回</li>
</ol>
</div>
<div>
<p><img src="images/Ch6p078.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="64" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="64" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="%E5%88%86%E5%B8%83%E5%BC%8F%E5%AD%98%E5%82%A8%E7%B3%BB%E7%BB%9F">分布式存储系统</h2>
<p>存储集群把多个存储节点、元数据服务器和客户服务器通过高速网络连接起来，通过元数据服务器对外提供统一命名空间。客户端从元数据服务器获取所请求文件的存储节点信息，然后直接存取相应的存储节点。</p>
<p>这种三方合作 I/O 模式，使存储集群具有良好的扩展性。存储集群通常使用<strong>分布式文件系统</strong>统一管理所有存储节点（如 Lustre、阿里盘古）。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="65" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="65" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E6%95%B0%E6%8D%AE%E5%AD%98%E5%8F%96%E8%B7%AF%E5%BE%84">数据存取路径</h2>
<p>分析数据存取性能涉及许多具体细节，一个最为重要的方法是分析数据的存取路径。存取路径包括：</p>
<ul>
<li><strong>物理过程：</strong> 数据在硬件部件上实际数据传输的过程</li>
<li><strong>逻辑过程：</strong> 软件对于数据的处理过程</li>
</ul>
<p>存取路径是数据在存储系统中传递的通道，无论是读还是写过程都需要数据和命令的传输。</p>
</div>
<div>
<p><img src="images/Ch6p080.png" alt="" style="width:520px;" /></p>
</div>
</div>
