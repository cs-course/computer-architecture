<h1 id="%E5%A4%96%E5%AD%98%E7%B3%BB%E7%BB%9F">外存系统</h1>
<p><strong>计算机系统结构</strong><br />
</p>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-class="lead" data-theme="gaia" lang="C" class="lead" data-marpit-pagination="1" style="" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="2" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="%E6%9C%AC%E7%AB%A0%E5%86%85%E5%AE%B9">本章内容</h2>
<ul>
<li><strong>掌握存储设备特性及其存储系统层次性结构</strong></li>
<li><strong>理解输入/输出过程及处理方式</strong></li>
<li><strong>掌握存储可靠性概念及提升方式</strong></li>
<li><strong>掌握磁盘阵列概念、分类和特点</strong></li>
<li><strong>掌握存储系统结构和处理过程</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="3" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="%E5%A4%96%E5%AD%98%E7%B3%BB%E7%BB%9F%E7%9A%84%E5%BF%85%E8%A6%81%E6%80%A7">外存系统的必要性</h2>
<ul>
<li>内存容量有限、单位存储成本较高、掉电后数据会丢失</li>
<li>外部存储系统（外存系统，Storage System）持久化、低成本、可靠地保存大量数据
<ul>
<li>外存介质、外存设备和外存系统</li>
</ul>
</li>
<li>处理器不能直接访问外存，需要通过输入/输出（I/O）机制
<ul>
<li>由硬件和软件协作完成 I/O 过程和数据管理</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="4" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="%E5%AD%98%E5%82%A8%E7%B3%BB%E7%BB%9F%E7%9A%84%E5%B1%82%E6%AC%A1%E6%80%A7">存储系统的层次性</h2>
<p>完整的计算机存储系统包含内存和外存。从处理器角度从内至外可分为多个层次：寄存器 → Cache → 内存 → 固态盘/磁盘/光盘 → 磁带/光盘/网络存储。</p>
<p><strong>存储系统层次化的主要原因：</strong> 满足成本约束的情况下，平衡存储容量和性能，使容量和成本接近最下层，而性能接近最上层。</p>
<p><strong>存储层次化的不利之处：</strong> 必须设计复杂的数据管理机制以保证数据正确地在不同层次间上下流动。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="5" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="%E6%95%B0%E6%8D%AE%E9%87%8F%E7%9A%84%E5%A2%9E%E9%95%BF%E8%B6%8B%E5%8A%BF">数据量的增长趋势</h2>
<p>IDC 预测 2020 年全球累计产生的数据总量已经达到 64.2 ZB，并且在 2020 年至 2025 年间仍将以约 23% 的年均复合增长率继续增长，2025 年数据量达到 175 ZB。</p>
<p>2018 年到 2025 年，所有存储设备的总出货量必须超过 22 ZB，大约 59% 的存储容量来自磁盘，大约 26% 的存储容量来自固态盘。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="6" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="%E5%AD%98%E5%82%A8%E8%AE%BE%E5%A4%87%E7%89%B9%E6%80%A7%E5%AF%B9%E6%AF%94">存储设备特性对比</h2>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="7" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E9%9D%9E%E6%98%93%E5%A4%B1%E6%80%A7%E5%86%85%E5%AD%98%E4%BB%8B%E8%B4%A8">非易失性内存介质</h2>
<p>多种物理存储材料：</p>
<ul>
<li>相变存储器（PCM）</li>
<li>自旋转移扭矩随机存取存储器（STT-RAM）</li>
<li>阻变存储器（RRAM）</li>
<li>Intel 傲腾持久内存模块（PMM）</li>
</ul>
<p><strong>PMM 的特点：</strong></p>
<ul>
<li>被插在内存总线上，连接到处理器的集成内存控制器（iMC）</li>
<li>访问粒度为 256 字节（XPLine）</li>
<li>多个 PMM 设备配置成交错模式，构成更大的存储体</li>
<li>可配置成内存模式（Memory mode）或应用直接访问模式（App Direct mode）</li>
</ul>
</div>
<div>
<p><img src="images/Ch6p007.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="8" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E5%9B%BA%E6%80%81%E7%A1%AC%E7%9B%98%E9%97%AA%E5%AD%98-nand-flash">固态硬盘（闪存 NAND Flash）</h2>
<p>闪存颗粒中的数据由保存在每个闪存单元中的电荷电压表示。不同类型的闪存单元可存储不同数量比特：</p>
<ul>
<li><strong>SLC（单层单元）：</strong> 存储 1 位</li>
<li><strong>MLC（两层单元）：</strong> 存储 2 位</li>
<li><strong>TLC（三层单元）：</strong> 存储 3 位</li>
<li><strong>QLC（四层单元）：</strong> 存储 4 位</li>
</ul>
<p>闪存单元一次注入电子（写操作）之后，在完全释放所存电子之前（擦除操作）不能再次注入，因此闪存固态盘<strong>不能原地更新</strong>。此外浮栅门开关次数有限，存在擦写寿命（P/E 次数）。层阶越高，P/E 次数越低。</p>
</div>
<div>
<p><img src="images/Ch6p008.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="9" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E5%9B%BA%E6%80%81%E7%A1%AC%E7%9B%98%E7%9A%84%E5%86%85%E9%83%A8%E7%BB%93%E6%9E%84">固态硬盘的内部结构</h2>
<p>SSD 内部包含多个闪存芯片（Chip），每个芯片包含一个或多个逻辑单元（Die），每个逻辑单元进一步包含一个或多个闪存平面（Plane），闪存平面被划分为上千个闪存块（Block），一个块进一步被划分为几百个闪存页（Page）。</p>
<ul>
<li><strong>块：</strong> 基本擦除单位</li>
<li><strong>页：</strong> 基本读写单位</li>
</ul>
<p>闪存页在被写之前必须先擦除，擦除操作一次必须擦除一整个闪存块。有效数据必须被迁移到其他块中的空闲页上，称之为<strong>垃圾回收（GC）</strong>。</p>
<p><strong>闪存转换层（FTL）</strong> 负责 I/O 请求处理，实现用户逻辑块地址（LBA）到固态盘内部物理块地址的映射，并执行磨损均衡和垃圾回收等功能。</p>
</div>
<div>
<p><img src="images/Ch6p009.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="10" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E6%9C%BA%E6%A2%B0%E7%A1%AC%E7%9B%98">机械硬盘</h2>
<p>机械硬盘主要由磁盘盘片、磁头、主轴与传动轴等组成。</p>
<ul>
<li>一块机械硬盘包含多个盘片，每个盘片有两个面，每个盘面都有一个读/写磁头</li>
<li>每个盘面被划分成一个个磁道，每个磁道进一步被划成相同数量的扇区</li>
<li><strong>扇区是硬盘的最小物理读写单位，通常是 512 字节</strong></li>
<li>每个磁片上的相同磁道构成一个圆柱面</li>
<li>主轴马达保持盘片匀速转动</li>
</ul>
<p><strong>磁盘处理一个读写 I/O 时，总延迟包括：</strong></p>
<ul>
<li>磁头寻道延迟</li>
<li>盘片旋转延迟</li>
<li>数据传输延迟</li>
</ul>
<p>读写同一磁道上数据，可避免额外的寻道时间。</p>
</div>
<div>
<p><img src="images/Ch6p010.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="11" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="%E7%A3%81%E7%9B%98%E8%AE%BF%E9%97%AE%E6%97%B6%E9%97%B4%E8%AE%A1%E7%AE%97">磁盘访问时间计算</h2>
<p><strong>例题：</strong> 对于磁盘而言，读写一个 512 字节扇区的平均磁盘访问时间是多少？假设此时磁盘空闲，没有排队延迟；平均寻道时间是 5ms，顺序传输速度是 200MB/s，转速是 7200 转/分，控制器的开销是 0.1ms。</p>
<p><strong>解答：</strong></p>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><mtext>平均磁盘访问时间</mtext><mo>=</mo><mtext>平均寻道时间</mtext><mo>+</mo><mtext>平均旋转延迟</mtext><mo>+</mo><mtext>传输时间</mtext><mo>+</mo><mtext>控制器开销</mtext></mrow><annotation encoding="application/x-tex">\text{平均磁盘访问时间} = \text{平均寻道时间} + \text{平均旋转延迟} + \text{传输时间} + \text{控制器开销}
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord text"><span class="mord cjk_fallback">平均磁盘访问时间</span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.7667em;vertical-align:-0.0833em;"></span><span class="mord text"><span class="mord cjk_fallback">平均寻道时间</span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">+</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.7667em;vertical-align:-0.0833em;"></span><span class="mord text"><span class="mord cjk_fallback">平均旋转延迟</span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">+</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.7667em;vertical-align:-0.0833em;"></span><span class="mord text"><span class="mord cjk_fallback">传输时间</span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">+</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord text"><span class="mord cjk_fallback">控制器开销</span></span></span></span></span></span></p><p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><mo>=</mo><mn>5</mn><mo>+</mo><mfrac><mn>0.5</mn><mn>7200</mn></mfrac><mo>+</mo><mfrac><mn>0.5</mn><mn>200</mn></mfrac><mo>+</mo><mn>0.1</mn><mo>=</mo><mn>5</mn><mo>+</mo><mn>4.2</mn><mo>+</mo><mn>0.0025</mn><mo>+</mo><mn>0.1</mn><mo>=</mo><mn>9.3</mn><mtext> ms</mtext></mrow><annotation encoding="application/x-tex">= 5 + \frac{0.5}{7200} + \frac{0.5}{200} + 0.1 = 5 + 4.2 + 0.0025 + 0.1 = 9.3 \text{ ms}
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.3669em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.7278em;vertical-align:-0.0833em;"></span><span class="mord">5</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">+</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:2.0074em;vertical-align:-0.686em;"></span><span class="mord"><span class="mopen nulldelimiter"></span><span class="mfrac"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:1.3214em;"><span style="top:-2.314em;"><span class="pstrut" style="height:3em;"></span><span class="mord"><span class="mord">7200</span></span></span><span style="top:-3.23em;"><span class="pstrut" style="height:3em;"></span><span class="frac-line" style="border-bottom-width:0.04em;"></span></span><span style="top:-3.677em;"><span class="pstrut" style="height:3em;"></span><span class="mord"><span class="mord">0.5</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.686em;"><span></span></span></span></span></span><span class="mclose nulldelimiter"></span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">+</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:2.0074em;vertical-align:-0.686em;"></span><span class="mord"><span class="mopen nulldelimiter"></span><span class="mfrac"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:1.3214em;"><span style="top:-2.314em;"><span class="pstrut" style="height:3em;"></span><span class="mord"><span class="mord">200</span></span></span><span style="top:-3.23em;"><span class="pstrut" style="height:3em;"></span><span class="frac-line" style="border-bottom-width:0.04em;"></span></span><span style="top:-3.677em;"><span class="pstrut" style="height:3em;"></span><span class="mord"><span class="mord">0.5</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.686em;"><span></span></span></span></span></span><span class="mclose nulldelimiter"></span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">+</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.6444em;"></span><span class="mord">0.1</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.7278em;vertical-align:-0.0833em;"></span><span class="mord">5</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">+</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.7278em;vertical-align:-0.0833em;"></span><span class="mord">4.2</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">+</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.7278em;vertical-align:-0.0833em;"></span><span class="mord">0.0025</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">+</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.6444em;"></span><span class="mord">0.1</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.6444em;"></span><span class="mord">9.3</span><span class="mord text"><span class="mord"> ms</span></span></span></span></span></span></p></section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="12" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch6p012.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="12" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="12" style="" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="13" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="io-%E7%B3%BB%E7%BB%9F%E6%A6%82%E8%BF%B0">I/O 系统概述</h2>
<p>处理器和外部设备交换数据，不能像存取内存一样通过指令直接寻址访问，而是需要执行输入/输出（I/O）操作。I/O 过程需要硬件和软件的协同处理。</p>
<ul>
<li><strong>I/O 硬件：</strong> 包括主机处理器、I/O 设备、两者之间的物理通道（如总线）和 I/O 控制硬件等</li>
<li><strong>I/O 软件：</strong> 负责协调多个硬件部件完成 I/O 过程的程序，包括驱动程序等</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="14" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9"><div class='columns'>
<div>
<h2 id="io-%E8%AE%BE%E5%A4%87%E4%B8%8E%E6%80%BB%E7%BA%BF">I/O 设备与总线</h2>
<p><strong>I/O 设备分成两类：</strong></p>
<ul>
<li><strong>块设备（block devices）：</strong> 存取数据的单位是固定大小、可寻址的块，如磁盘、固态盘、蓝光光盘、USB 盘等</li>
<li><strong>字符设备（character devices）：</strong> 以字符为单位发送或接收一个字符流，不考虑寻址，如打印机、键盘和鼠标等</li>
</ul>
<p><strong>主机对所有设备进行统一编址：</strong></p>
<ul>
<li><strong>Port-Mapped I/O：</strong> 独立的设备地址空间</li>
<li><strong>Memory-Mapped I/O：</strong> 统一内存地址映射方式</li>
</ul>
<p>设备可以看成一个&quot;I/O 处理器&quot;，接收并处理主机发出的 I/O 请求。</p>
</div>
<div>
<p><img src="images/Ch6p014.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="15" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9"><div class='columns'>
<div>
<h2 id="pcie-%E6%80%BB%E7%BA%BF">PCIe 总线</h2>
<p>PCIe 是目前最为流行的高速总线，包含一个根组件（Root Complex）、多个终端点（End Point）和多个数据通道（lane）。一对根端口和终端点组成一个点对点连接对。</p>
<p>PCI 是并行总线，排线频率提升困难；PCIe 采用串行总线方式。PCIe 使用交换组件（Switch）扩展连接更多终端点，还可以通过桥接芯片扩展连接到更多慢速总线。</p>
</div>
<div>
<p><img src="images/Ch6p015.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="16" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E8%AE%BE%E5%A4%87%E9%A9%B1%E5%8A%A8%E7%A8%8B%E5%BA%8F%E4%B8%8E-io-%E6%A8%A1%E5%BC%8F">设备驱动程序与 I/O 模式</h2>
<p>主机通过设备驱动程序具体执行 I/O 过程，通过设置寄存器来和设备进行通讯。</p>
<p><strong>三种 I/O 过程模式：</strong></p>
<ul>
<li><strong>程序控制 I/O</strong></li>
<li><strong>中断驱动（Interrupts）I/O</strong></li>
<li><strong>直接内存存取（DMA）驱动 I/O</strong></li>
</ul>
</div>
<div>
<p><img src="images/Ch6p016.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="17" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9"><div class='columns'>
<div>
<h2 id="io-%E5%A4%84%E7%90%86%E6%A8%A1%E5%9E%8B">I/O 处理模型</h2>
<p>I/O 处理是 CPU 和设备之间的交互处理过程，可以抽象为请求-服务模型或客户端-服务器模型。</p>
<p><strong>从请求程序来看：</strong> I/O 请求可以分为同步 I/O 和异步 I/O 模式</p>
<p><strong>从服务程序来看：</strong> 有阻塞 I/O 和非阻塞 I/O 两种方式</p>
<p><strong>5 种常用 I/O 处理模型：</strong></p>
<ul>
<li>同步阻塞 I/O 模型</li>
<li>异步阻塞 I/O 模型</li>
<li>同步非阻塞 I/O 模型（同步轮询模型）</li>
<li>非阻塞 I/O 复用模型</li>
<li>非阻塞信号驱动 I/O 模型</li>
</ul>
</div>
<div>
<p><img src="images/Ch6p017.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="18" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E7%BC%93%E5%86%B2%E5%8C%BA%E7%BC%93%E5%AD%98%E4%B8%8E%E8%AF%B7%E6%B1%82%E9%98%9F%E5%88%97">缓冲区、缓存与请求队列</h2>
<p><strong>数据缓冲区（Buffer）：</strong> 当两个设备之间有明显的速度差异（如 CPU 和磁盘）时，可以配置缓冲区。慢速设备把缓冲区写满后，会一次全部发送到快速设备。为了保证设备持续写入，可以使用双缓冲区。</p>
<p><strong>缓存（Cache）：</strong> 利用不同存储介质之间的性能差异和访问局域性，把数据副本保存在比通常存储数据位置更快的访问位置。</p>
<p><strong>请求队列：</strong> 服务程序可以服务多个请求程序，可以使用请求队列维护待请求，进一步执行队列调度优化整体性能。</p>
</div>
<div>
<p><img src="images/Ch6p018.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="19" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9"><div class='columns'>
<div>
<h2 id="io-%E6%80%A7%E8%83%BD%E6%8C%87%E6%A0%87">I/O 性能指标</h2>
<p>响应时间和吞吐量同样适用于 I/O，这两个指标往往具有一个平衡关系。</p>
<p><strong>吞吐率指标：I/O 数（IOPS）和 MByte/s</strong></p>
<p><strong>例题：</strong> I/O 系统具有单个磁盘，读写带宽为 200MB/s。测试结果表明 1MB 大小的请求响应时间是 5ms，0.1MB 大小的请求响应时间为 2ms。</p>
<ul>
<li>1MB IOPS = 200 个；0.1MB IOPS = 500 个</li>
<li>1MB 吞吐率 = 200×1MB/s = 200MB/s（磁盘带宽 100% 利用）</li>
<li>0.1MB 吞吐率 = 500×0.1MB/s = 50MB/s（磁盘带宽仅 25% 利用）</li>
</ul>
<p><strong>IOPS 数值不能很好地反映实际的性能。</strong></p>
</div>
<div>
<p><img src="images/Ch6p019.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="20" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="%E6%8E%92%E9%98%9F%E8%AE%BA%E5%9F%BA%E7%A1%80">排队论基础</h2>
<p>构建数学模型来粗略计算请求-服务模型系统的响应时间和吞吐率，这种数学模型称之为<strong>排队论</strong>。</p>
<p><strong>Little 定律：</strong> 建立平均任务数、新任务的平均到达率和执行任务的平均时间之间的关系：</p>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><mtext>平均任务数</mtext><mo>=</mo><mtext>任务到达率</mtext><mo>×</mo><mtext>平均响应时间</mtext></mrow><annotation encoding="application/x-tex">\text{平均任务数} = \text{任务到达率} \times \text{平均响应时间}
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord text"><span class="mord cjk_fallback">平均任务数</span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.7667em;vertical-align:-0.0833em;"></span><span class="mord text"><span class="mord cjk_fallback">任务到达率</span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">×</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord text"><span class="mord cjk_fallback">平均响应时间</span></span></span></span></span></span></p><p>Little 定律适用于任何处于平衡状态的系统，只要系统内部不会创建或删除任务，并且有不受响应时间影响的稳定任务达到。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="21" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E6%8E%92%E9%98%9F%E8%AE%BA%E6%A0%B8%E5%BF%83%E6%A6%82%E5%BF%B5">排队论核心概念</h2>
<ul>
<li><strong>服务时间（Time_server）：</strong> 服务任务的平均时间；平均服务费率为 1/服务时间</li>
<li><strong>排队时间（Time_queue）：</strong> 队列中的平均排队时间</li>
<li><strong>响应时间（Time_system）：</strong> 排队时间和服务时间的总和 = Time_queue + Time_server</li>
<li><strong>任务到达率（Arrive rate）：</strong> 任务到达的平均数量/秒</li>
<li><strong>服务任务数量（Length_server）：</strong> 正在服务中的平均任务数</li>
<li><strong>队列长度（Length_queue）：</strong> 队列的平均长度</li>
</ul>
<p><strong>服务器利用率</strong> = Arrival_rate × Time_server</p>
<p>服务利用率必须在 0 到 1 之间；否则服务装置将会过载。</p>
</div>
<div>
<p><img src="images/Ch6p021.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="22" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="%E8%AF%B7%E6%B1%82%E6%9C%8D%E5%8A%A1%E5%88%86%E5%B8%83%E7%B1%BB%E5%9E%8B">请求服务分布类型</h2>
<ul>
<li>常数分布</li>
<li>指数分布</li>
<li>正态分布</li>
<li>二项式分布</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="23" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="%E6%8E%92%E9%98%9F%E9%98%9F%E5%88%97%E4%B8%8E%E5%88%A9%E7%94%A8%E7%8E%87">排队队列与利用率</h2>
<p>在稳态情况下，Little 定律能够很好地利用到黑盒服务器模型：</p>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><msub><mtext>Length</mtext><mrow><mi>q</mi><mi>u</mi><mi>e</mi><mi>u</mi><mi>e</mi></mrow></msub><mo>=</mo><mtext>到达率</mtext><mo>×</mo><msub><mtext>Time</mtext><mrow><mi>q</mi><mi>u</mi><mi>e</mi><mi>u</mi><mi>e</mi></mrow></msub></mrow><annotation encoding="application/x-tex">\text{Length}_{queue} = \text{到达率} \times \text{Time}_{queue}
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1.0747em;vertical-align:-0.3802em;"></span><span class="mord"><span class="mord text"><span class="mord">Length</span></span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.0573em;"><span style="top:-2.4559em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mathnormal mtight" style="margin-right:0.0359em;">q</span><span class="mord mathnormal mtight">u</span><span class="mord mathnormal mtight">e</span><span class="mord mathnormal mtight">u</span><span class="mord mathnormal mtight">e</span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.3802em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.7667em;vertical-align:-0.0833em;"></span><span class="mord text"><span class="mord cjk_fallback">到达率</span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">×</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.9694em;vertical-align:-0.2861em;"></span><span class="mord"><span class="mord text"><span class="mord">Time</span></span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.1514em;"><span style="top:-2.55em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mathnormal mtight" style="margin-right:0.0359em;">q</span><span class="mord mathnormal mtight">u</span><span class="mord mathnormal mtight">e</span><span class="mord mathnormal mtight">u</span><span class="mord mathnormal mtight">e</span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2861em;"><span></span></span></span></span></span></span></span></span></span></span></p><p>由于 <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mtext>到达率</mtext><mo>×</mo><msub><mtext>Time</mtext><mrow><mi>s</mi><mi>e</mi><mi>r</mi><mi>v</mi><mi>e</mi><mi>r</mi></mrow></msub><mo>=</mo><mtext>服务器利用率</mtext></mrow><annotation encoding="application/x-tex">\text{到达率} \times \text{Time}_{server} = \text{服务器利用率}</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.7667em;vertical-align:-0.0833em;"></span><span class="mord text"><span class="mord cjk_fallback">到达率</span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">×</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.8333em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord text"><span class="mord">Time</span></span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.1514em;"><span style="top:-2.55em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mathnormal mtight" style="margin-right:0.0278em;">ser</span><span class="mord mathnormal mtight" style="margin-right:0.0359em;">v</span><span class="mord mathnormal mtight" style="margin-right:0.0278em;">er</span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord text"><span class="mord cjk_fallback">服务器利用率</span></span></span></span></span>，进一步简化得到：</p>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><msub><mtext>Length</mtext><mrow><mi>q</mi><mi>u</mi><mi>e</mi><mi>u</mi><mi>e</mi></mrow></msub><mo>=</mo><mfrac><msup><mtext>服务器利用率</mtext><mn>2</mn></msup><mrow><mn>1</mn><mo>−</mo><mtext>服务器利用率</mtext></mrow></mfrac></mrow><annotation encoding="application/x-tex">\text{Length}_{queue} = \frac{\text{服务器利用率}^2}{1 - \text{服务器利用率}}
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1.0747em;vertical-align:-0.3802em;"></span><span class="mord"><span class="mord text"><span class="mord">Length</span></span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.0573em;"><span style="top:-2.4559em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mathnormal mtight" style="margin-right:0.0359em;">q</span><span class="mord mathnormal mtight">u</span><span class="mord mathnormal mtight">e</span><span class="mord mathnormal mtight">u</span><span class="mord mathnormal mtight">e</span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.3802em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:2.3337em;vertical-align:-0.7693em;"></span><span class="mord"><span class="mopen nulldelimiter"></span><span class="mfrac"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:1.5643em;"><span style="top:-2.314em;"><span class="pstrut" style="height:3em;"></span><span class="mord"><span class="mord">1</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">−</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mord text"><span class="mord cjk_fallback">服务器利用率</span></span></span></span><span style="top:-3.23em;"><span class="pstrut" style="height:3em;"></span><span class="frac-line" style="border-bottom-width:0.04em;"></span></span><span style="top:-3.677em;"><span class="pstrut" style="height:3em;"></span><span class="mord"><span class="mord"><span class="mord text"><span class="mord cjk_fallback">服务器利用率</span></span><span class="msupsub"><span class="vlist-t"><span class="vlist-r"><span class="vlist" style="height:0.8873em;"><span style="top:-3.1362em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">2</span></span></span></span></span></span></span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.7693em;"><span></span></span></span></span></span><span class="mclose nulldelimiter"></span></span></span></span></span></span></p><p>排队情况和服务器利用率之间的关系符合直觉：任务越多，排队越长。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="24" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9"><div class='columns'>
<div>
<h2 id="mm1-%E6%8E%92%E9%98%9F%E6%A8%A1%E5%9E%8B">M/M/1 排队模型</h2>
<p><strong>模型假设：</strong></p>
<ul>
<li>系统处于平衡状态</li>
<li>到达间隔时间满足指数分布</li>
<li>请求源的数量不受限制（无限队列）</li>
<li>服务器串行执行任务</li>
<li>队列长度没有限制，遵循先进先出原则</li>
<li>只有一台服务器</li>
</ul>
<p><strong>M/M/1 模型：</strong> 第一个 M 指请求到达间隔时间分布满足指数随机分布；第二个 M 指服务时间分布也是指数分布；1 代表只有一个服务器。</p>
</div>
<div>
<p><img src="images/Ch6p024.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="25" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch6p025.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="25" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="25" style="" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="26" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="%E5%AD%98%E5%82%A8%E5%8F%AF%E9%9D%A0%E6%80%A7%E6%A6%82%E8%BF%B0">存储可靠性概述</h2>
<p>存储设备是数据持久化载体，其首要功能就是保证数据不丢失。对数据进行有效的保护已成为存储系统最为关键的要求。</p>
<p>当计算和传输设备产生错误时，可以通过重新计算或重传保证数据可靠性，但前提是相应的数据应该保存完好。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="27" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E5%8F%AF%E9%9D%A0%E6%80%A7%E5%9F%BA%E6%9C%AC%E6%A6%82%E5%BF%B5">可靠性基本概念</h2>
<p><strong>出错原因：</strong></p>
<ul>
<li><strong>错误（fault）：</strong> 设计时模块所存在的潜在问题</li>
<li><strong>差错（error）：</strong> 错误的表现形式，在服务时才会表现出来</li>
<li><strong>故障（failure）：</strong> 差错导致模块不工作</li>
</ul>
<p><strong>可靠性量化指标：</strong></p>
<ul>
<li>可靠度（R）、可维护度、可用品度</li>
<li>MTTF（平均无故障时间）</li>
<li>MTTR（平均修复时间）</li>
<li>MTBF（平均故障间隔时间）</li>
</ul>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><mtext>可靠度：</mtext><mi>R</mi><mo stretchy="false">(</mo><mi>t</mi><mo stretchy="false">)</mo><mo>=</mo><mi>P</mi><mo stretchy="false">{</mo><mi>x</mi><mo>&gt;</mo><mi>t</mi><mo stretchy="false">}</mo><mo separator="true">,</mo><mspace width="1em"/><mtext>MTTF</mtext><mo>=</mo><msubsup><mo>∫</mo><mn>0</mn><mi mathvariant="normal">∞</mi></msubsup><mi>R</mi><mo stretchy="false">(</mo><mi>t</mi><mo stretchy="false">)</mo><mi>d</mi><mi>t</mi></mrow><annotation encoding="application/x-tex">\text{可靠度：} R(t) = P\{x&gt;t\}, \quad \text{MTTF} = \int_0^\infty R(t) dt
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord text"><span class="mord cjk_fallback">可靠度：</span></span><span class="mord mathnormal" style="margin-right:0.0077em;">R</span><span class="mopen">(</span><span class="mord mathnormal">t</span><span class="mclose">)</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord mathnormal" style="margin-right:0.1389em;">P</span><span class="mopen">{</span><span class="mord mathnormal">x</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">&gt;</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord mathnormal">t</span><span class="mclose">}</span><span class="mpunct">,</span><span class="mspace" style="margin-right:1em;"></span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord text"><span class="mord">MTTF</span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:2.3262em;vertical-align:-0.9119em;"></span><span class="mop"><span class="mop op-symbol large-op" style="margin-right:0.4445em;position:relative;top:-0.0011em;">∫</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:1.4143em;"><span style="top:-1.7881em;margin-left:-0.4445em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">0</span></span></span><span style="top:-3.8129em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">∞</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.9119em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord mathnormal" style="margin-right:0.0077em;">R</span><span class="mopen">(</span><span class="mord mathnormal">t</span><span class="mclose">)</span><span class="mord mathnormal">d</span><span class="mord mathnormal">t</span></span></span></span></span></p></div>
<div>
<p><img src="images/Ch6p027.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="28" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="%E5%8F%AF%E7%94%A8%E6%80%A7%E4%B8%8E-mttf-%E6%8F%90%E5%8D%87%E6%96%B9%E6%B3%95">可用性与 MTTF 提升方法</h2>
<p><strong>系统可用性（Availability）</strong> 定义为系统可以为用户所使用时间的百分比。</p>
<p><strong>提高 MTTF 的四种方法：</strong></p>
<ul>
<li>避错（Fault Avoidance）</li>
<li>容错（Fault Tolerance）</li>
<li>除错（Error Removal）</li>
<li>差错预测（Error Forecasting）</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="29" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9"><div class='columns'>
<div>
<h2 id="%E4%B8%B2%E8%A1%8C%E4%B8%8E%E5%B9%B6%E8%81%94%E7%B3%BB%E7%BB%9F%E5%8F%AF%E9%9D%A0%E6%80%A7">串行与并联系统可靠性</h2>
<p><strong>串联系统：</strong> N 个组件必须全部工作正常，系统才正常。任一组件失效时，系统就失效。</p>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><mi>R</mi><mo>=</mo><msub><mi>R</mi><mn>1</mn></msub><mo>∩</mo><msub><mi>R</mi><mn>2</mn></msub><mo>∩</mo><mo>⋯</mo><mo>∩</mo><msub><mi>R</mi><mi>N</mi></msub></mrow><annotation encoding="application/x-tex">R = R_1 \cap R_2 \cap \dots \cap R_N
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord mathnormal" style="margin-right:0.0077em;">R</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.8333em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.0077em;">R</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:-0.0077em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">1</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">∩</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.8333em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.0077em;">R</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:-0.0077em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">2</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">∩</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.5556em;"></span><span class="minner">⋯</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">∩</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.8333em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.0077em;">R</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3283em;"><span style="top:-2.55em;margin-left:-0.0077em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight" style="margin-right:0.109em;">N</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span></span></span></span></span></p><p><strong>并联系统：</strong> N 个组件只要其中一个工作正常，系统就正常工作。只有全部组件都失效时，系统才失效。</p>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><mi>F</mi><mo>=</mo><msub><mi>F</mi><mn>1</mn></msub><mo>∩</mo><msub><mi>F</mi><mn>2</mn></msub><mo>∩</mo><mo>⋯</mo><mo>∩</mo><msub><mi>F</mi><mi>N</mi></msub></mrow><annotation encoding="application/x-tex">F = F_1 \cap F_2 \cap \dots \cap F_N
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord mathnormal" style="margin-right:0.1389em;">F</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.8333em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.1389em;">F</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:-0.1389em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">1</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">∩</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.8333em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.1389em;">F</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:-0.1389em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">2</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">∩</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.5556em;"></span><span class="minner">⋯</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">∩</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.8333em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.1389em;">F</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3283em;"><span style="top:-2.55em;margin-left:-0.1389em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight" style="margin-right:0.109em;">N</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span></span></span></span></span></p><p><strong>串并联系统的可靠性：</strong> n 个部件先构成串联组件，m 个组件进一步构成并联结构。</p>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><mi>R</mi><mo stretchy="false">(</mo><mi>t</mi><mo stretchy="false">)</mo><mo>=</mo><mn>1</mn><mo>−</mo><mo stretchy="false">[</mo><mn>1</mn><mo>−</mo><msub><mi>R</mi><mi>i</mi></msub><mo stretchy="false">(</mo><mi>t</mi><mo stretchy="false">)</mo><msup><mo stretchy="false">]</mo><mrow><mi>m</mi><mo>⋅</mo><mi>n</mi></mrow></msup></mrow><annotation encoding="application/x-tex">R(t) = 1 - [1 - R_i(t)]^{m \cdot n}
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord mathnormal" style="margin-right:0.0077em;">R</span><span class="mopen">(</span><span class="mord mathnormal">t</span><span class="mclose">)</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.7278em;vertical-align:-0.0833em;"></span><span class="mord">1</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">−</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mopen">[</span><span class="mord">1</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">−</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.0077em;">R</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:-0.0077em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">i</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mopen">(</span><span class="mord mathnormal">t</span><span class="mclose">)</span><span class="mclose"><span class="mclose">]</span><span class="msupsub"><span class="vlist-t"><span class="vlist-r"><span class="vlist" style="height:0.7241em;"><span style="top:-3.113em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mathnormal mtight">m</span><span class="mbin mtight">⋅</span><span class="mord mathnormal mtight">n</span></span></span></span></span></span></span></span></span></span></span></span></span></p><p><strong>并串联系统的可靠性：</strong></p>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><mi>R</mi><mo stretchy="false">(</mo><mi>t</mi><mo stretchy="false">)</mo><mo>=</mo><mo stretchy="false">[</mo><mn>1</mn><mo>−</mo><mo stretchy="false">(</mo><mn>1</mn><mo>−</mo><msub><mi>R</mi><mi>i</mi></msub><mo stretchy="false">(</mo><mi>t</mi><mo stretchy="false">)</mo><msup><mo stretchy="false">)</mo><mi>m</mi></msup><msup><mo stretchy="false">]</mo><mi>n</mi></msup></mrow><annotation encoding="application/x-tex">R(t) = [1 - (1 - R_i(t))^m]^n
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord mathnormal" style="margin-right:0.0077em;">R</span><span class="mopen">(</span><span class="mord mathnormal">t</span><span class="mclose">)</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mopen">[</span><span class="mord">1</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">−</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mopen">(</span><span class="mord">1</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">−</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.0077em;">R</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:-0.0077em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">i</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mopen">(</span><span class="mord mathnormal">t</span><span class="mclose">)</span><span class="mclose"><span class="mclose">)</span><span class="msupsub"><span class="vlist-t"><span class="vlist-r"><span class="vlist" style="height:0.7144em;"><span style="top:-3.113em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">m</span></span></span></span></span></span></span></span><span class="mclose"><span class="mclose">]</span><span class="msupsub"><span class="vlist-t"><span class="vlist-r"><span class="vlist" style="height:0.7144em;"><span style="top:-3.113em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">n</span></span></span></span></span></span></span></span></span></span></span></span></p><p>计算机系统中器件越多，可靠性越低：N 器件的可靠性一般只有单个器件的 1/N。</p>
</div>
<div>
<p><img src="images/Ch6p029.png" alt="" style="width:520px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="30" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="%E5%AE%B9%E9%94%99%E6%9C%BA%E5%88%B6">容错机制</h2>
<p>容错机制成为存储系统提高系统可用性的主要方法：</p>
<ul>
<li><strong>副本技术：</strong> 保存数据的多个副本</li>
<li><strong>纠删码技术：</strong> 分为系统码和非系统码
<ul>
<li>任意 r 个数据分块丢失均能够通过存活的数据和校验分块解码出丢失数据</li>
<li>最大纠错上限为 <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mn>2</mn><mi>t</mi></mrow><annotation encoding="application/x-tex">2t</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6444em;"></span><span class="mord">2</span><span class="mord mathnormal">t</span></span></span></span>，符合 MDS（Maximum Distance Separable）条件的纠删码称为最大距离可分码</li>
<li>里德-所罗门（Reed-Solomon，RS）编码是典型代表</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="31" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch6p031.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="31" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="content"></section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="31" style="" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="32" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="%E7%A3%81%E7%9B%98%E9%98%B5%E5%88%97raid%E6%A6%82%E8%BF%B0">磁盘阵列（RAID）概述</h2>
<p><strong>RAID（Redundant Array of Inexpensive/Independent Disks）：</strong> 使用多个磁盘的组合来代替一个大容量的磁盘。</p>
<p><strong>基本原理：</strong></p>
<ul>
<li>以条带为单位把数据均匀地分布到多个磁盘上，让多个磁盘并行工作</li>
<li>当多个数据读写请求并行处理，总的 I/O 性能提高
<ul>
<li>如果一个请求访问多个块，可由多个盘合作并行处理，提高数据传输率</li>
<li>多个独立的请求可由多个盘并行处理，减少 I/O 请求的排队等待时间</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="33" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="raid-%E7%9A%84%E6%9D%A1%E5%B8%A6%E5%8C%96">RAID 的条带化</h2>
<p>条带中数据块是交叉存放的单位。数据块大小可初始时配置，对性能有直接影响：</p>
<ul>
<li>数据块小于磁盘和主机交换数据的单位可能造成 I/O 放大</li>
<li>数据块太大，磁盘间并行性难以利用</li>
</ul>
<p><strong>冗余数据的计算方法：</strong></p>
<ul>
<li>大多采用奇偶校验码</li>
<li>也可采用汉明码（Hamming code）或 Reed-Solomon 码</li>
</ul>
<p><strong>冗余信息的存放方式：</strong></p>
<ul>
<li>集中存放在少数的几个盘中</li>
<li>均匀存放到所有的盘中（能避免出现热点问题）</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="34" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="raid-%E7%BA%A7%E5%88%AB%E6%80%BB%E8%A7%88">RAID 级别总览</h2>
<table>
<thead>
<tr>
<th>级别</th>
<th>名称</th>
<th>特点</th>
</tr>
</thead>
<tbody>
<tr>
<td>RAID 0</td>
<td>条带化</td>
<td>数据分割，无容错能力</td>
</tr>
<tr>
<td>RAID 1</td>
<td>镜像</td>
<td>双拷贝，冗余备份</td>
</tr>
<tr>
<td>RAID 2</td>
<td>汉明码</td>
<td>并行位交叉，单校验盘</td>
</tr>
<tr>
<td>RAID 3</td>
<td>奇偶校验</td>
<td>并行块交叉，单校验盘</td>
</tr>
<tr>
<td>RAID 4</td>
<td>块交叉奇偶校验</td>
<td>独立，循环校验盘</td>
</tr>
<tr>
<td>RAID 5</td>
<td>分布式奇偶校验</td>
<td>块交叉，分布式校验</td>
</tr>
<tr>
<td>RAID 6</td>
<td>双校验</td>
<td>P+Q 双校验，可容双盘错</td>
</tr>
<tr>
<td>RAID 10</td>
<td>RAID 1+0</td>
<td>先镜像再条带存放</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="35" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="raid-0">RAID 0</h2>
<p><strong>非冗余磁盘阵列：</strong> 把数据切分成条带，以条带为单位交叉地分布存放到多个磁盘中。</p>
<p><strong>优点：</strong> 空间利用率高；读写快；设计简单</p>
<p><strong>缺点：</strong> 没有容错能力</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="36" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="raid-0-%E7%9A%84%E8%AF%BB%E5%86%99%E4%B8%8E%E6%95%85%E9%9A%9C">RAID 0 的读写与故障</h2>
<ul>
<li><strong>写入：</strong> 数据条带化分布到各磁盘，并行写入</li>
<li><strong>读取：</strong> 可从多盘并行读取数据</li>
<li><strong>故障：</strong> 任一磁盘损坏，数据无法恢复</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="37" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="raid-1%E9%95%9C%E5%83%8F">RAID 1（镜像）</h2>
<p><strong>镜像磁盘：</strong> 对所有磁盘数据提供一份冗余的备份。每当把数据写入磁盘时，将该数据也写入其镜像盘。</p>
<p><strong>RAID 1 特点：</strong></p>
<ul>
<li>能实现快速读取操作</li>
<li>写入操作时镜像的两个磁盘都要写入，但可并行进行，不需要计算校验信息，速度比更高级别 RAID 快</li>
<li>可靠性高，数据恢复简单</li>
<li><strong>实现成本最高</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="38" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="raid-1-%E7%9A%84%E8%AF%BB%E5%86%99%E4%B8%8E%E6%81%A2%E5%A4%8D">RAID 1 的读写与恢复</h2>
<ul>
<li><strong>写入：</strong> 同时向数据盘和镜像盘写入</li>
<li><strong>读取：</strong> 可从任一副本读取</li>
<li><strong>恢复：</strong> 任一盘损坏，从镜像盘恢复即可</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="39" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="raid-2%E6%B1%89%E6%98%8E%E7%BA%A0%E9%94%99%E7%A0%81">RAID 2（汉明纠错码）</h2>
<p>存储器式的磁盘阵列（按汉明纠错码的思路构建）。含 4 个数据盘，配合专用纠错码盘（汉明码）。</p>
<p><strong>汉明纠错码原理（7/4 码）：</strong></p>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><msub><mi>h</mi><mn>0</mn></msub><mo>=</mo><msub><mi>b</mi><mn>0</mn></msub><mo>⊕</mo><msub><mi>b</mi><mn>1</mn></msub><mo>⊕</mo><msub><mi>b</mi><mn>3</mn></msub></mrow><annotation encoding="application/x-tex">h_0 = b_0 \oplus b_1 \oplus b_3
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.8444em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal">h</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">0</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.8444em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal">b</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">0</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">⊕</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.8444em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal">b</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">1</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">⊕</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.8444em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal">b</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">3</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span></span></span></span></span></p><p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><msub><mi>h</mi><mn>1</mn></msub><mo>=</mo><msub><mi>b</mi><mn>0</mn></msub><mo>⊕</mo><msub><mi>b</mi><mn>2</mn></msub><mo>⊕</mo><msub><mi>b</mi><mn>3</mn></msub></mrow><annotation encoding="application/x-tex">h_1 = b_0 \oplus b_2 \oplus b_3

ss="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">2</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">⊕</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.8444em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal">b</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">3</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span></span></span></span></span></p><p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><msub><mi>h</mi><mn>2</mn></msub><mo>=</mo><msub><mi>b</mi><mn>1</mn></msub><mo>⊕</mo><msub><mi>b</mi><mn>2</mn></msub><mo>⊕</mo><msub><mi>b</mi><mn>3</mn></msub></mrow><annotation encoding="application/x-tex">h_2 = b_1 \oplus b_2 \oplus b_3
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.8444em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal">h</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">2</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.8444em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal">b</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">1</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">⊕</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.8444em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal">b</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">2</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">⊕</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.8444em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal">b</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">3</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span></span></span></span></span></p><p>通过校验位可以检测并定位单比特错误。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="40" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="raid-3%E4%BD%8D%E4%BA%A4%E5%8F%89%E5%A5%87%E5%81%B6%E6%A0%A1%E9%AA%8C">RAID 3（位交叉奇偶校验）</h2>
<p><strong>交叉奇偶校验磁盘阵列：</strong> 采用位交叉（条带宽度小）。</p>
<ul>
<li>写数据时：为每行数据形成奇偶校验位并写入校验盘</li>
<li>读出数据时：根据故障盘以外的所有其他盘中的正确信息恢复故障盘中的数据（通过异或运算实现）</li>
<li>多个磁盘的并行访问，但不能同时进行多个 I/O 请求的处理</li>
<li>只需要一个校验盘，校验空间开销比较小</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="41" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="raid-4%E5%9D%97%E4%BA%A4%E5%8F%89%E5%A5%87%E5%81%B6%E6%A0%A1%E9%AA%8C">RAID 4（块交叉奇偶校验）</h2>
<p><strong>块交叉奇偶校验磁盘阵列：</strong> 采用比较大的条带，以块为单位进行交叉存放和计算奇偶校验。实现目标：能同时处理多个小规模访问请求。</p>
<p><strong>RAID 4 读写特点：</strong></p>
<ul>
<li><strong>读取：</strong> 每次只需访问数据所在的磁盘。仅在该磁盘出现故障时，才会去读校验盘，并进行数据重建</li>
<li><strong>写入：</strong> 写一块数据需要 2 次磁盘读和 2 次磁盘写操作</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="42" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9">
<h2 id="raid-4-%E5%86%99%E8%BF%87%E7%A8%8B%E8%AF%A6%E8%A7%A3">RAID 4 写过程详解</h2>
<p>写入新数据 A0' 到块 A0 的过程：</p>
<ol>
<li><strong>读取旧数据 A0 和旧校验码 P</strong>（读两次）</li>
<li><strong>计算新校验码：</strong> <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><msup><mi>P</mi><mo mathvariant="normal" lspace="0em" rspace="0em">′</mo></msup><mo>=</mo><msub><mi>A</mi><mn>0</mn></msub><mo>⊕</mo><mi>P</mi><mo>⊕</mo><msubsup><mi>A</mi><mn>0</mn><mo mathvariant="normal" lspace="0em" rspace="0em">′</mo></msubsup></mrow><annotation encoding="application/x-tex">P&#x27; = A_0 \oplus P \oplus A_0&#x27;</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.7519em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.1389em;">P</span><span class="msupsub"><span class="vlist-t"><span class="vlist-r"><span class="vlist" style="height:0.7519em;"><span style="top:-3.063em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mtight">′</span></span></span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.8333em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal">A</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">0</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">⊕</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.7667em;vertical-align:-0.0833em;"></span><span class="mord mathnormal" style="margin-right:0.1389em;">P</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">⊕</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.2481em;"></span><span class="mord"><span class="mord mathnormal">A</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.7519em;"><span style="top:-2.4519em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">0</span></span></span><span style="top:-3.063em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mtight">′</span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2481em;"><span></span></span></span></span></span></span></span></span></span></li>
<li><strong>写入新数据 A0' 和新校验码 P'</strong>（写两次）</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="43" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;images/Ch6p051.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-theme="gaia" lang="C" data-marpit-pagination="43" style="--paginate:true;--theme:gaia;" data-marpit-pagination-total="67" data-size="16:9" data-marpit-advanced-background="content"></section>
